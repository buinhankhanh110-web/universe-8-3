<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Backbone 10A1 Universe</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; }
        .layer { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            flex-direction: column; z-index: 10; background: rgba(0,0,0,0.7);
        }
        .hidden { display: none; }
        input, button { padding: 10px; margin: 10px; }
        #profile-box { border: 2px solid #fff; padding: 20px; text-align: center; background: #111; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="scene-login" class="layer">
    <h1>10A1 PORTAL</h1>
    <input type="password" id="pass" placeholder="Mật khẩu lớp...">
    <button onclick="runLogin()">KÍCH HOẠT</button>
</div>

<div id="scene-profile" class="layer hidden">
    <div id="profile-box">
        <h2 id="p-name"></h2>
        <p id="p-wish"></p>
        <button onclick="closeProfile()">ĐÓNG</button>
    </div>
</div>

<div id="scene-teacher" class="layer hidden" style="background: #fff; color: #000;">
    <h1>GỬI CÔ GIÁO</h1>
    <p>Cảm ơn cô đã đồng hành cùng 10A1</p>
</div>

<script>
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');
let w, h, stars = [], currentScene = 'IDLE';
let speed = 0.5, viewed = 0;

// Data mẫu 30 bạn
const girls = Array.from({length: 30}, (_, i) => ({
    name: `Bạn nữ ${i+1}`, pass: "1", wish: "Chúc bạn 8/3 vui vẻ!", 
    active: true, x: 0, y: 0
}));

function init() {
    w = cvs.width = window.innerWidth;
    h = cvs.height = window.innerHeight;
    stars = Array.from({length: 200}, () => ({
        x: Math.random()*w - w/2, y: Math.random()*h - h/2, z: Math.random()*w
    }));
    // Tọa độ thô cho chữ 10A1 (Scene 3)
    girls.forEach((g, i) => {
        g.x = (i % 10) * 60 - 270;
        g.y = Math.floor(i / 10) * 80 - 100;
    });
}

function draw() {
    ctx.fillStyle = (currentScene === 'WARP') ? 'rgba(0,0,0,0.2)' : '#000';
    ctx.fillRect(0, 0, w, h);
    ctx.save();
    ctx.translate(w/2, h/2);

    stars.forEach((s, i) => {
        s.z -= speed;
        if(s.z <= 0) s.z = w;
        let x = s.x * (w/s.z);
        let y = s.y * (h/s.z);

        // Logic điều khiển các cảnh
        if(currentScene === 'CONSTELLATION' && i < 30) {
            let g = girls[i];
            // Scene 8: Collapse (Hút vào tâm)
            if(window.isCollapsing) { g.x *= 0.9; g.y *= 0.9; if(Math.abs(g.x)<1) currentScene = 'SUPERNOVA'; }
            
            s.x += (g.x - s.x) * 0.1;
            s.y += (g.y - s.y) * 0.1;
            s.z = 1000;
            if(g.active) drawPoint(s.x, s.y, 5, '#fff');
        } else {
            drawPoint(x, y, 2, '#888');
        }
    });

    if(currentScene === 'SUPERNOVA') drawSupernova();

    ctx.restore();
    requestAnimationFrame(draw);
}

function drawPoint(x, y, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
}

// HÀNH TRÌNH CHUYỂN CẢNH
function runLogin() {
    if(document.getElementById('pass').value === '10A1') {
        document.getElementById('scene-login').classList.add('hidden');
        currentScene = 'WARP'; // Scene 2
        speed = 50; 
        setTimeout(() => { currentScene = 'CONSTELLATION'; speed = 0.5; }, 3000); // Scene 3
    }
}

cvs.addEventListener('click', (e) => {
    if(currentScene !== 'CONSTELLATION') return;
    girls.forEach(g => {
        let dx = e.clientX - w/2 - g.x;
        let dy = e.clientY - h/2 - g.y;
        if(Math.sqrt(dx*dx + dy*dy) < 20 && g.active) {
            let p = prompt(`Pass của ${g.name}:`); // Scene 4
            if(p === g.pass) openProfile(g);
        }
    });
});

function openProfile(g) {
    document.getElementById('scene-profile').classList.remove('hidden'); // Scene 5
    document.getElementById('p-name').innerText = g.name;
    document.getElementById('p-wish').innerText = g.wish;
    window.cur = g;
}

function closeProfile() {
    document.getElementById('scene-profile').classList.add('hidden');
    window.cur.active = false; // Scene 6: Biến mất
    viewed++;
    if(viewed >= 30) { // Scene 7 & 8
        girls.forEach(g => g.active = true);
        setTimeout(() => { window.isCollapsing = true; }, 1000);
    }
}

let snSize = 0;
function drawSupernova() {
    snSize += 20;
    drawPoint(0, 0, snSize, '#fff'); // Scene 9
    if(snSize > w) document.getElementById('scene-teacher').classList.remove('hidden'); // Scene 10
}

window.onresize = init;
init();
draw();
</script>
</body>
</html>
