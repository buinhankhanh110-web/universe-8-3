<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>30 Vũ Trụ Riêng</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* canvas background */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

/* star */

.star{
position:absolute;
border-radius:50%;
cursor:pointer;
transition:transform .3s;
}

.star:hover{
transform:scale(1.2);
}

.star::before{
content:"";
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:radial-gradient(circle,white 0%,#8ee6ff 40%,transparent 80%);
animation:pulse 2.5s infinite;
}

.star::after{
content:"";
position:absolute;
width:220%;
height:220%;
top:-60%;
left:-60%;
border-radius:50%;
background:radial-gradient(circle,rgba(142,230,255,.4),transparent 70%);
filter:blur(25px);
}

@keyframes pulse{
0%{transform:scale(.9);opacity:.7}
50%{transform:scale(1.1);opacity:1}
100%{transform:scale(.9);opacity:.7}
}

/* name */

.label{
position:absolute;
color:white;
font-size:13px;
white-space:nowrap;
pointer-events:none;
transform:translateX(-50%);
}

/* popup */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.85);
border:1px solid #8ee6ff;
padding:25px;
color:white;
border-radius:10px;
display:none;
text-align:center;
}

.popup button{
margin-top:10px;
padding:6px 15px;
background:#8ee6ff;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="popup" id="popup">
<h2 id="popupName"></h2>
<p>Đây là một ngôi sao trong vũ trụ lớp chúng ta ✨</p>
<button onclick="closePopup()">Đóng</button>
</div>

<script>

/* =========================
CANVAS BACKGROUND
========================= */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

/* stars */

let bgStars=[]

for(let i=0;i<200;i++){
bgStars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
speed:0.2+Math.random()*0.3
})
}

/* shooting star */

let shooting=null

function drawBackground(){

ctx.fillStyle="#020412"
ctx.fillRect(0,0,canvas.width,canvas.height)

/* nebula */

let nebula=ctx.createRadialGradient(
canvas.width*.7,
canvas.height*.4,
50,
canvas.width*.7,
canvas.height*.4,
600
)

nebula.addColorStop(0,"rgba(120,180,255,.5)")
nebula.addColorStop(.3,"rgba(80,150,255,.2)")
nebula.addColorStop(1,"transparent")

ctx.fillStyle=nebula
ctx.fillRect(0,0,canvas.width,canvas.height)

/* stars */

bgStars.forEach(s=>{
s.y+=s.speed
if(s.y>canvas.height)s.y=0

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()
})

/* shooting star */

if(Math.random()<0.002){
shooting={
x:Math.random()*canvas.width,
y:0,
vx:6,
vy:4
}
}

if(shooting){
ctx.beginPath()
ctx.moveTo(shooting.x,shooting.y)
ctx.lineTo(shooting.x-80,shooting.y-40)
ctx.strokeStyle="white"
ctx.lineWidth=2
ctx.stroke()

shooting.x+=shooting.vx
shooting.y+=shooting.vy

if(shooting.y>canvas.height)shooting=null
}

requestAnimationFrame(drawBackground)

}

drawBackground()

/* =========================
CLASSMATES
========================= */

let classmates=[
"An","Bình","Chi","Duy","Hà","Hân","Hoa","Hương",
"Lan","Linh","Mai","Minh","My","Ngân","Ngọc",
"Phương","Quỳnh","Trang","Trâm","Vy","Yến",
"Ánh","Bảo","Cúc","Đào","Giang","Huyền",
"Khánh","Liên","Nhi"
]

/* =========================
STARS
========================= */

let orbitStars=[]
let totalStars=classmates.length

setTimeout(()=>{

for(let i=0;i<totalStars;i++){

let star=document.createElement("div")
star.className="star"

let size=25+Math.random()*15

star.style.width=size+"px"
star.style.height=size+"px"

/* spawn */

let side=Math.floor(Math.random()*4)
let startX,startY

if(side===0){startX=Math.random()*window.innerWidth;startY=-100}
if(side===1){startX=window.innerWidth+100;startY=Math.random()*window.innerHeight}
if(side===2){startX=Math.random()*window.innerWidth;startY=window.innerHeight+100}
if(side===3){startX=-100;startY=Math.random()*window.innerHeight}

let finalX=Math.random()*window.innerWidth
let finalY=Math.random()*window.innerHeight

star.style.left=startX+"px"
star.style.top=startY+"px"

star.style.transition="all 2s ease-out"

document.body.appendChild(star)

/* label */

let label=document.createElement("div")
label.className="label"
label.innerText=classmates[i]

document.body.appendChild(label)

/* click */

star.onclick=()=>{
openPopup(classmates[i])
}

/* move */

setTimeout(()=>{
star.style.left=finalX+"px"
star.style.top=finalY+"px"
},50)

setTimeout(()=>{

orbitStars.push({
element:star,
label:label,
baseX:finalX,
baseY:finalY,
angle:Math.random()*Math.PI*2,
speed:.005+Math.random()*.01,
radius:10+Math.random()*15
})

},2000)

}

setTimeout(animateOrbit,2000)

},2000)

/* orbit */

function animateOrbit(){

orbitStars.forEach(s=>{

s.angle+=s.speed

let x=s.baseX+Math.cos(s.angle)*s.radius
let y=s.baseY+Math.sin(s.angle)*s.radius

s.element.style.left=x+"px"
s.element.style.top=y+"px"

s.label.style.left=x+"px"
s.label.style.top=(y+35)+"px"

})

requestAnimationFrame(animateOrbit)

}

/* =========================
POPUP
========================= */

function openPopup(name){
document.getElementById("popup").style.display="block"
document.getElementById("popupName").innerText=name
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
