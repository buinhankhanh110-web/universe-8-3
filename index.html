<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vũ Trụ Lớp Chúng Ta</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

.star{
position:absolute;
border-radius:50%;
cursor:pointer;
transition:transform .3s;
}

.star:hover{
transform:scale(1.2);
}

.star::before{
content:"";
position:absolute;
width:100%;
height:100%;
border-radius:50%;

background:radial-gradient(
circle,
white 0%,
#8ee6ff 40%,
rgba(142,230,255,0.3) 65%,
transparent 80%
);

animation:pulse 2.5s infinite;
}

.star::after{
content:"";
position:absolute;
width:240%;
height:240%;
top:-70%;
left:-70%;
border-radius:50%;

background:radial-gradient(
circle,
rgba(142,230,255,0.4),
transparent 70%
);

filter:blur(30px);
}

@keyframes pulse{

0%{
transform:scale(.9);
opacity:.7;
}

50%{
transform:scale(1.1);
opacity:1;
}

100%{
transform:scale(.9);
opacity:.7;
}

}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<script>

/* ===== CANVAS BACKGROUND ===== */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let starsBg=[]

for(let i=0;i<250;i++){

starsBg.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5

})

}

function drawBackground(){

ctx.fillStyle="#020412"
ctx.fillRect(0,0,canvas.width,canvas.height)

/* tinh vân */

let nebula=ctx.createRadialGradient(

canvas.width*0.65,
canvas.height*0.4,
50,

canvas.width*0.65,
canvas.height*0.4,
700

)

nebula.addColorStop(0,"rgba(120,180,255,0.6)")
nebula.addColorStop(.3,"rgba(80,150,255,0.3)")
nebula.addColorStop(.6,"rgba(60,120,255,0.15)")
nebula.addColorStop(1,"transparent")

ctx.fillStyle=nebula
ctx.fillRect(0,0,canvas.width,canvas.height)

/* sao nền */

starsBg.forEach(s=>{

ctx.beginPath()

ctx.arc(s.x,s.y,s.r,0,Math.PI*2)

ctx.fillStyle="white"
ctx.shadowColor="#8ee6ff"
ctx.shadowBlur=8

ctx.fill()

})

ctx.shadowBlur=0

requestAnimationFrame(drawBackground)

}

drawBackground()

/* ===== MAIN STARS ===== */

let classmates=[

"An","Bình","Chi","Duy","Hà",
"Hân","Hoa","Hương","Lan","Linh",
"Mai","Minh","My","Ngân","Ngọc",
"Phương","Quỳnh","Trang","Trâm","Vy",
"Yến","Ánh","Bảo","Cúc","Đào",
"Giang","Huyền","Khánh","Liên","Nhi"

]

let totalStars=30

let orbitStars=[]

let centerX=window.innerWidth/2
let centerY=window.innerHeight/2

/* sao trung tâm */

let centerStar=document.createElement("div")

centerStar.className="star"

centerStar.style.width="50px"
centerStar.style.height="50px"

centerStar.style.left=(centerX-25)+"px"
centerStar.style.top=(centerY-25)+"px"

centerStar.dataset.name="Lớp chúng ta"

centerStar.onclick=()=>{

alert("🌟 Đây là ngôi sao của cả lớp!")

}

document.body.appendChild(centerStar)

/* spawn sao */

setTimeout(()=>{

for(let i=0;i<totalStars;i++){

let star=document.createElement("div")
star.className="star"

let size=25+Math.random()*20

star.style.width=size+"px"
star.style.height=size+"px"

/* vị trí cuối */

let finalX=Math.random()*window.innerWidth
let finalY=Math.random()*window.innerHeight

/* spawn ngoài màn hình */

let side=Math.floor(Math.random()*4)

let startX,startY

if(side===0){

startX=Math.random()*window.innerWidth
startY=-120

}

else if(side===1){

startX=window.innerWidth+120
startY=Math.random()*window.innerHeight

}

else if(side===2){

startX=Math.random()*window.innerWidth
startY=window.innerHeight+120

}

else{

startX=-120
startY=Math.random()*window.innerHeight

}

star.style.left=startX+"px"
star.style.top=startY+"px"

star.style.transition="all 2s ease-out"

document.body.appendChild(star)

/* gắn tên */

star.dataset.name=classmates[i]

/* click */

star.onclick=()=>{

alert("⭐ Ngôi sao của: "+star.dataset.name)

}

/* bay vào */

setTimeout(()=>{

star.style.left=finalX+"px"
star.style.top=finalY+"px"

},50)

/* orbit */

setTimeout(()=>{

star.style.transition="none"

orbitStars.push({

element:star,
baseX:finalX,
baseY:finalY,
angle:Math.random()*Math.PI*2,
speed:0.01+Math.random()*0.01,
radius:10+Math.random()*20

})

},2000)

}

setTimeout(()=>{

animateOrbit()

},2000)

},3000)

/* orbit animation */

function animateOrbit(){

orbitStars.forEach(s=>{

s.angle+=s.speed

let x=s.baseX+Math.cos(s.angle)*s.radius
let y=s.baseY+Math.sin(s.angle)*s.radius

s.element.style.left=x+"px"
s.element.style.top=y+"px"

})

requestAnimationFrame(animateOrbit)

}

</script>

</body>
</html>
