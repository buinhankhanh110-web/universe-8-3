<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vũ Trụ Riêng</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

h1 {
  margin-top: 20vh;
  font-size: 40px;
}

.message {
  font-size: 18px;
  width: 70%;
  margin: 20px auto;
  line-height: 1.6;
}
.glow {
  text-shadow: 0 0 10px var(--mainColor), 0 0 20px var(--mainColor);
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<h1 class="glow" id="name">⭐ Vì Sao</h1>
<div class="message glow" id="text"></div>

<script>

// ======= CHỈ CẦN ĐỔI SỐ Ở ĐÂY =======
const theme = 1;
// =====================================

// 30 màu khác nhau
const themes = [
  "#ff66cc","#00ffff","#ffcc00","#66ff99","#ff4444",
  "#cc99ff","#00ffcc","#ff8800","#66ccff","#ff6699",
  "#99ff66","#ffccff","#00ff99","#ffaa00","#cc66ff",
  "#33ccff","#ff3366","#66ffcc","#ff9933","#9966ff",
  "#00ccff","#ff6699","#99ffcc","#ffcc66","#66cc99",
  "#ff0066","#33ffcc","#ff9900","#cc66cc","#00ffff"
];

document.documentElement.style.setProperty('--mainColor', themes[theme-1]);

document.getElementById("name").innerText = "⭐ Vì Sao: [ĐỔI TÊN Ở ĐÂY]";

const message = `
Chúc bạn luôn giữ được ánh sáng riêng của mình.
Cảm ơn vì đã làm lớp mình đặc biệt hơn.
Hy vọng năm nay sẽ là một năm thật rực rỡ với bạn.
`;

typeWriter(message, "text");

function typeWriter(text, id) {
  let i = 0;
  const speed = 40;
  function typing() {
    if (i < text.length) {
      document.getElementById(id).innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// STAR BACKGROUND
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 2,
    alpha: Math.random()
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";
  stars.forEach(star => {
    ctx.globalAlpha = star.alpha;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, 2 * Math.PI);
    ctx.fill();
  });
}

function animate() {
  stars.forEach(star => {
    star.alpha += (Math.random() - 0.5) * 0.02;
    if (star.alpha < 0) star.alpha = 0;
    if (star.alpha > 1) star.alpha = 1;
  });
  drawStars();
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
