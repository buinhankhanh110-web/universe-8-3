<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe 10A1 - 8/3 Special</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; }
        
        .ui-layer { 
            position: absolute; z-index: 10; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); color: white;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        /* Login Portal - Glassmorphism style */
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); padding: 50px; 
            border-radius: 20px; backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.1);
        }
        input { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); 
            color: white; padding: 15px; border-radius: 10px; outline: none; 
            width: 250px; font-size: 18px; text-align: center; margin-bottom: 20px;
        }
        button { 
            background: linear-gradient(45deg, #00d4ff, #ff0080); color: white; 
            border: none; padding: 15px 40px; border-radius: 10px; 
            cursor: pointer; font-weight: bold; letter-spacing: 2px;
        }

        /* Modal cho từng bạn nữ */
        #profile-modal { background: rgba(0,0,0,0.9); }
        .content { text-align: center; max-width: 600px; padding: 20px; }
        h2 { font-size: 3rem; margin: 0; color: #ff0080; text-shadow: 0 0 20px rgba(255,0,128,0.5); }
    </style>
</head>
<body>

<canvas id="universe"></canvas>

<div id="scene-login" class="ui-layer">
    <div class="glass-card">
        <h1 style="letter-spacing: 10px; font-weight: 300;">10A1 PORTAL</h1>
        <input type="password" id="main-pass" placeholder="MẬT KHẨU LỚP">
        <br>
        <button onclick="checkLogin()">KÍCH HOẠT HÀNH TRÌNH</button>
    </div>
</div>

<div id="profile-modal" class="ui-layer hidden">
    <div class="content">
        <h2 id="g-name"></h2>
        <p id="g-wish" style="font-size: 1.4rem; line-height: 1.8; color: #ddd;"></p>
        <button onclick="closeProfile()" style="margin-top: 30px; background: white; color: black;">QUAY LẠI</button>
    </div>
</div>

<div id="scene-teacher" class="ui-layer hidden" style="background: white; color: black; flex-direction: column;">
    <h1 style="font-size: 4rem;">GỬI CÔ GIÁO</h1>
    <p style="max-width: 700px; font-size: 1.5rem; text-align: center;">"Cô là ngôi sao dẫn đường cho tập thể 10A1 tỏa sáng."</p>
</div>

<script>
const canvas = document.getElementById('universe');
const ctx = canvas.getContext('2d');
let w, h, stars = [], currentScene = 'IDLE';
let speed = 0.2, warpFactor = 0, viewedCount = 0;
let nebulaOpacity = 0;

// Dữ liệu 30 bạn (Ông tự điền vào đây nhé)
const girls = Array.from({length: 30}, (_, i) => ({
    name: `Bạn nữ ${i+1}`, pass: "123", wish: "8/3 vui vẻ rạng ngời!", 
    active: true, tx: 0, ty: 0
}));

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<500; i++) {
        stars.push({
            x: Math.random()*w-w/2, y: Math.random()*h-h/2, z: Math.random()*w,
            px: 0, py: 0, 
            hue: Math.random() < 0.8 ? 200 : Math.random()*360 // Đa số là màu xanh
        });
    }
    // Setup vị trí chữ 10A1
    girls.forEach((g, i) => {
        g.tx = (i % 10) * 80 - 360;
        g.ty = Math.floor(i / 10) * 100 - 100;
    });
}

function draw() {
    // Nền Nebula mờ ảo
    ctx.fillStyle = `rgba(0, 0, 5, ${currentScene === 'WARP' ? 0.2 : 1})`;
    ctx.fillRect(0, 0, w, h);

    if (currentScene === 'WARP') drawNebulaFlash();

    ctx.save();
    ctx.translate(w/2, h/2);

    stars.forEach((s, i) => {
        s.z -= speed;
        if(s.z <= 0) s.z = w;

        let x = s.x * (w/s.z);
        let y = s.y * (h/s.z);

        if(currentScene === 'CONSTELLATION' && i < 30) {
            let g = girls[i];
            s.x += (g.tx - s.x) * 0.05;
            s.y += (g.ty - s.y) * 0.05;
            s.z = 1000;
            if(g.active) drawStar(s.x, s.y, 4, '#00d4ff', true);
        } else {
            let trail = (currentScene === 'WARP') ? warpFactor : 1;
            ctx.beginPath();
            ctx.strokeStyle = `hsla(${s.hue}, 80%, 80%, ${1 - s.z/w})`;
            ctx.lineWidth = 1;
            ctx.moveTo(x, y);
            ctx.lineTo(s.px * trail, s.py * trail);
            ctx.stroke();
        }
        s.px = x; s.py = y;
    });

    ctx.restore();
    requestAnimationFrame(draw);
}

function drawStar(x, y, r, color, glow) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = color;
    if(glow) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = color;
    }
    ctx.fill();
    ctx.shadowBlur = 0;
}

function drawNebulaFlash() {
    let grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
    grad.addColorStop(0, `rgba(255, 0, 128, ${nebulaOpacity})`);
    grad.addColorStop(0.5, `rgba(0, 212, 255, ${nebulaOpacity*0.5})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
}

function checkLogin() {
    if(document.getElementById('main-pass').value === '10A1') {
        document.getElementById('scene-login').classList.add('hidden');
        currentScene = 'WARP';
        // Hiệu ứng tăng tốc mượt mà
        let interval = setInterval(() => {
            speed += 2;
            warpFactor = 1.2;
            nebulaOpacity += 0.02;
            if(speed > 60) {
                clearInterval(interval);
                setTimeout(() => {
                    currentScene = 'CONSTELLATION';
                    speed = 0.2;
                    nebulaOpacity = 0;
                }, 2000);
            }
        }, 50);
    }
}

canvas.addEventListener('click', (e) => {
    if(currentScene !== 'CONSTELLATION') return;
    girls.forEach(g => {
        let dx = e.clientX - w/2 - g.tx;
        let dy = e.clientY - h/2 - g.ty;
        if(Math.sqrt(dx*dx + dy*dy) < 30 && g.active) {
            let p = prompt(`Mật khẩu của ${g.name}:`);
            if(p === g.pass) {
                document.getElementById('g-name').innerText = g.name;
                document.getElementById('g-wish').innerText = g.wish;
                document.getElementById('profile-modal').classList.remove('hidden');
                window.cur = g;
            }
        }
    });
});

function closeProfile() {
    document.getElementById('profile-modal').classList.add('hidden');
    window.cur.active = false;
    viewedCount++;
    if(viewedCount >= 30) {
        // Supernova & Teacher Page
        setTimeout(() => {
            currentScene = 'WARP';
            speed = 100;
            setTimeout(() => {
                document.getElementById('scene-teacher').classList.remove('hidden');
            }, 2000);
        }, 1000);
    }
}

window.onresize = init;
init();
draw();
</script>
</body>
</html>
