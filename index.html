<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>10A1 GALAXY - THE FINAL CHAPTER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: absolute; inset: 0; }

        /* --- UI LAYER --- */
        #gate-container {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #001a1a 0%, #000 100%);
            transition: 1.5s;
        }

        .energy-orb {
            width: 180px; height: 180px; border-radius: 50%; border: 2px solid #00f2ff;
            box-shadow: 0 0 50px #00f2ff; margin-bottom: 40px;
            animation: orbPulse 3s infinite ease-in-out;
        }

        .main-title { font-family: 'Orbitron'; font-size: 4rem; color: #fff; letter-spacing: 15px; text-shadow: 0 0 20px #00f2ff; }

        .btn-launch {
            margin-top: 40px; padding: 15px 50px; background: #fff; border-radius: 30px;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.4s;
        }

        /* --- MODAL LỜI CHÚC --- */
        #wish-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0, 10, 20, 0.95); border: 1px solid #00f2ff; padding: 40px;
            width: 350px; border-radius: 20px; color: white; text-align: center;
            opacity: 0; pointer-events: none; transition: 0.5s; z-index: 1000;
        }
        #wish-modal.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

        /* --- HIỆU ỨNG VỤ NỔ (WHITE OUT) --- */
        #big-bang-overlay {
            position: fixed; inset: 0; background: white; opacity: 0;
            pointer-events: none; z-index: 2000; transition: opacity 0.3s;
        }

        /* --- PHẦN CÔ GIÁO --- */
        #teacher-part {
            position: fixed; inset: 0; z-index: 2500; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
            background: #000; color: #ff00ff; opacity: 0; pointer-events: none;
            transition: 2s; text-align: center;
        }
        #teacher-part.show { opacity: 1; pointer-events: auto; }

        .hidden { opacity: 0 !important; visibility: hidden; }
        @keyframes orbPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

<canvas id="universe"></canvas>
<div id="big-bang-overlay"></div>

<div id="gate-container">
    <div class="energy-orb"></div>
    <h1 class="main-title">GALAXY 10A1</h1>
    <input type="password" id="pass" style="padding:10px; border-radius:10px; text-align:center" placeholder="PASS: 83">
    <button class="btn-launch" onclick="Galaxy.ignite()">ENGAGE</button>
</div>

<div id="wish-modal">
    <h2 id="dispName" style="color:#00f2ff; font-family:'Orbitron'"></h2>
    <p id="dispWish" style="font-style:italic"></p>
    <button onclick="Galaxy.closeModal()" style="margin-top:20px">TIẾP TỤC KHÁM PHÁ</button>
</div>

<div id="teacher-part">
    <h1 id="typewriter-title" style="font-family:'Orbitron'; font-size:4rem; text-shadow:0 0 30px #f0f"></h1>
    <p id="typewriter-msg" style="font-size:1.5rem; color:#fff; max-width:600px; min-height: 100px; margin: 20px 0;"></p>
    <button onclick="location.reload()" style="background:#f0f; color:#fff; border:none; padding:15px 40px; cursor:pointer; font-family:'Orbitron'; margin-top:30px">KHỞI TẠO LẠI VŨ TRỤ</button>
</div>

<script>
/** * SIÊU HỆ THỐNG GALAXY - XƯƠNG SỐNG CHI TIẾT 
 */
const girlsData = Array.from({length: 30}, (_, i) => ({
    id: i, n: `Bạn Nữ ${i+1}`, w: `Chúc bạn ngày 8/3 rạng rỡ như ngôi sao thứ ${i+1}!`, clicked: false
}));

const Galaxy = {
    canvas: document.getElementById('universe'),
    stars: [], constellation: [], 
    speed: 0.8, targetSpeed: 0.8,
    viewedCount: 0, 
    phase: 'IDLE', // IDLE, WARP, EXPLORE, REBIRTH, BIGBANG

    init() {
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        for(let i=0; i<1500; i++) this.stars.push({ x:Math.random()*4000-2000, y:Math.random()*4000-2000, z:Math.random()*4000, pz:0 });
        this.animate();
        window.onresize = () => this.resize();
        this.canvas.onclick = (e) => this.handleInteraction(e);
    },

    resize() { this.w = this.canvas.width = window.innerWidth; this.h = this.canvas.height = window.innerHeight; },

    ignite() {
        if(document.getElementById('pass').value !== "83") return alert("Sai mã!");
        document.getElementById('gate-container').classList.add('hidden');
        this.phase = 'WARP';
        this.targetSpeed = 80;
        setTimeout(() => {
            this.targetSpeed = 0.5;
            this.phase = 'EXPLORE';
            this.buildConstellation();
        }, 2500);
    },

    buildConstellation() {
        const cx = this.w/2, cy = this.h/2, u = Math.min(this.w, this.h)/10;
        // Tọa độ 10A1 (giản lược để 30 điểm rải đều)
        this.constellation = girlsData.map((g, i) => {
            const angle = (i / 30) * Math.PI * 2;
            return { ...g, x: cx + Math.cos(angle)*u*3, y: cy + Math.sin(angle)*u*3, op: 1, visible: true, size: 4 };
        });
    },

    handleInteraction(e) {
        if(this.phase !== 'EXPLORE') return;
        this.constellation.forEach(s => {
            if(s.visible && Math.hypot(e.clientX - s.x, e.clientY - s.y) < 20) {
                this.showModal(s);
            }
        });
    },

    showModal(s) {
        document.getElementById('dispName').innerText = s.n;
        document.getElementById('dispWish').innerText = s.w;
        document.getElementById('wish-modal').classList.add('active');
        this.currentStar = s;
    },

    closeModal() {
        document.getElementById('wish-modal').classList.remove('active');
        if(this.currentStar && !this.currentStar.clicked) {
            this.currentStar.visible = false; // Ngôi sao mất đi
            this.currentStar.clicked = true;
            this.viewedCount++;
            if(this.viewedCount >= 30) this.startCinematicEnding();
        }
    },

    startCinematicEnding() {
        this.phase = 'REBIRTH';
        // 1. Xuất hiện lại 30 sao
        this.constellation.forEach(s => { s.visible = true; s.op = 0; });
        
        // 2. Quay vòng và kết hợp
        setTimeout(() => {
            let angle = 0;
            const spin = setInterval(() => {
                angle += 0.2;
                this.constellation.forEach((s, i) => {
                    const r = (1 - angle/20) * 300; // Thu hẹp dần vào tâm
                    s.x = this.w/2 + Math.cos(i + angle) * r;
                    s.y = this.h/2 + Math.sin(i + angle) * r;
                    if(r < 10) {
                        clearInterval(spin);
                        this.triggerBigBang();
                    }
                });
            }, 30);
        }, 1000);
    },

   triggerBigBang() {
    this.phase = 'BIGBANG';
    // Tạo 500 hạt nổ ánh sáng từ tâm màn hình
    this.bangParticles = Array.from({length: 500}, () => ({
        x: this.w / 2,
        y: this.h / 2,
        vx: (Math.random() - 0.5) * 40, // Tốc độ bay ngang
        vy: (Math.random() - 0.5) * 40, // Tốc độ bay dọc
        c: `hsl(${Math.random() * 360}, 100%, 70%)`, // Màu sắc rực rỡ
        size: Math.random() * 4 + 1
    }));

    const overlay = document.getElementById('big-bang-overlay');
    overlay.style.opacity = '1'; // Làm trắng màn hình tạm thời

    setTimeout(() => {
        document.getElementById('teacher-part').classList.add('show');
        overlay.style.opacity = '0';
        
        // Kích hoạt hiệu ứng chữ chạy cho Cô giáo (Đã hướng dẫn ở phần Typewriter)
        this.typeWriter("typewriter-title", "GỬI CÔ CHỦ NHIỆM", 100);
        setTimeout(() => {
            this.typeWriter("typewriter-msg", "Người lái đò thầm lặng, bông hoa rực rỡ nhất trong dải ngân hà 10A1. Chúc Cô mãi hạnh phúc và rạng rỡ!", 40);
        }, 1500);

        this.bangParticles = []; // Xóa hạt để giải phóng bộ nhớ
    }, 1200);
},
   // --- ĐOẠN NÀY THAY THẾ TỪ HÀM ANIMATE ĐẾN HẾT SCRIPT ---
    
    // Hàm tạo chữ chạy (Hacker Typewriter)
    typeWriter(elementId, text, speed = 50) {
        let i = 0;
        const el = document.getElementById(elementId);
        if(!el) return;
        el.innerHTML = ""; 
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    },

    animate() {
        this.speed += (this.targetSpeed - this.speed) * 0.05;
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0,0,this.w,this.h);

        // 1. Vẽ sao nền (Starfield)
        this.stars.forEach(s => {
            s.pz = s.z; s.z -= this.speed;
            if(s.z < 1) s.z = 4000;
            let x = (s.x/s.z)*this.w + this.w/2, y = (s.y/s.z)*this.h + this.h/2;
            this.ctx.fillStyle = `rgba(255,255,255,${1-s.z/4000})`;
            this.ctx.fillRect(x, y, 2, 2);
        });

        // 2. Vẽ 30 ngôi sao tương tác (Glow Effect nâng cấp)
        if(this.phase === 'EXPLORE' || this.phase === 'REBIRTH') {
            this.constellation.forEach(s => {
                if(!s.visible) return;

                // Lớp 1: Hào quang (Glow)
                let g = this.ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 8);
                g.addColorStop(0, `rgba(0, 242, 255, ${s.op * 0.8})`);
                g.addColorStop(0.5, `rgba(0, 242, 255, ${s.op * 0.2})`);
                g.addColorStop(1, 'rgba(0, 242, 255, 0)');
                this.ctx.fillStyle = g;
                this.ctx.beginPath(); this.ctx.arc(s.x, s.y, s.size * 8, 0, Math.PI*2); this.ctx.fill();

                // Lớp 2: Nhân sao trắng (Core)
                this.ctx.fillStyle = `rgba(255, 255, 255, ${s.op})`;
                this.ctx.beginPath(); this.ctx.arc(s.x, s.y, s.size/2, 0, Math.PI*2); this.ctx.fill();
            });
        }

        // 3. Vẽ vụ nổ Big Bang Particle
        if(this.phase === 'BIGBANG' && this.bangParticles) {
            this.bangParticles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                p.vx *= 0.96; p.vy *= 0.96; p.size *= 0.98;
                this.ctx.fillStyle = p.c;
                this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, 7); this.ctx.fill();
            });
            // Hiệu ứng rung màn hình khi nổ
            this.ctx.translate((Math.random()-0.5)*5, (Math.random()-0.5)*5);
        }

        requestAnimationFrame(() => this.animate());
    } // Đóng hàm animate
}; // Đóng đối tượng Galaxy

Galaxy.init();
</script>
</body>
</html>
