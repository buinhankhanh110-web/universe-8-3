<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10A1 Universe - Special Gift</title>
    <style>
        :root { --glow: #ff0080; --neon: #00d4ff; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* UI Layer */
        .ui-container { position: absolute; z-index: 10; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { opacity: 0; pointer-events: none !important; transform: scale(1.1); }

        /* Glassmorphism Card */
        .glass-card { 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 40px; text-align: center; width: 350px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        h1 { font-weight: 200; letter-spacing: 8px; margin-bottom: 30px; font-size: 1.2rem; text-transform: uppercase; }
        input { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px; border-radius: 8px; color: white; width: 80%; outline: none;
            text-align: center; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        
        button {
            margin-top: 25px; padding: 12px 35px; border-radius: 8px; border: none;
            background: linear-gradient(45deg, var(--neon), var(--glow));
            color: white; font-weight: bold; cursor: pointer; letter-spacing: 2px;
            transition: 0.3s; text-transform: uppercase;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(255, 0, 128, 0.4); }

        /* Profile Style */
        #girl-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--neon); margin-bottom: 15px; object-fit: cover; }
        .private-view { width: 100%; height: 450px; border-radius: 10px; overflow: hidden; margin-top: 15px; background: #111; display: none; }
        .private-view img { width: 100%; height: 100%; object-fit: contain; }

        #lock-icon { font-size: 40px; margin: 20px 0; display: block; filter: drop-shadow(0 0 10px gold); }
    </style>
</head>
<body>

<canvas id="universe"></canvas>

<div id="scene-login" class="ui-container">
    <div class="glass-card">
        <h1>10A1 Portal</h1>
        <input type="password" id="main-pass" placeholder="MẬT KHẨU VŨ TRỤ">
        <button onclick="startJourney()">Kích hoạt</button>
    </div>
</div>

<div id="scene-unlock" class="ui-container hidden">
    <div class="glass-card" id="portal-box">
        <img id="girl-img" src="">
        <h2 id="girl-name" style="margin: 0; font-weight: 300;"></h2>
        
        <div id="lock-section">
            <span id="lock-icon">🔒</span>
            <input type="password" id="girl-pass" placeholder="Nhập mã bí mật">
            <br>
            <button onclick="unlockGirl()">Mở khóa</button>
            <p style="font-size: 0.7rem; color: #888; cursor:pointer;" onclick="closePortal()">[ Đóng ]</p>
        </div>

        <div id="private-view" class="private-view">
            <img id="canva-img" src="">
            <button onclick="closePortal()" style="margin-bottom: 20px;">Hoàn tất</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('universe');
    const ctx = canvas.getContext('2d');
    let w, h, stars = [], currentScene = 'IDLE';
    let speed = 0.2, warpSpeed = 0, shake = 0, overlayOpacity = 0;

    // DỮ LIỆU 30 BẠN NỮ - ÔNG THAY ẢNH VÀO ĐÂY
    const girls = Array.from({length: 30}, (_, i) => ({
        id: i,
        name: `Bạn Nữ ${i + 1}`,
        pass: "123", // Thay pass riêng ở đây
        img: "https://via.placeholder.com/150", // Ảnh đại diện
        canva: "https://via.placeholder.com/300x450", // Ảnh thiết kế Canva
        unlocked: false, // Trạng thái mở khóa riêng biệt
        x: 0, y: 0, group: ""
    }));

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        stars = Array.from({length: 450}, () => ({
            x: Math.random()*w - w/2, y: Math.random()*h - h/2, z: Math.random()*w,
            color: `hsla(${180 + Math.random()*60}, 70%, 80%, ${Math.random()})`
        }));
        map10A1();
    }

    function map10A1() {
        girls.forEach((g, i) => {
            if(i < 8) { g.x = -280; g.y = i*45-160; g.group="1"; }
            else if(i < 20) { 
                let a = (i-8)*(Math.PI*2/12);
                g.x = -100 + 70*Math.cos(a); g.y = 90*Math.sin(a); g.group="0";
            }
            else if(i < 26) { 
                g.x = 80 + (i-20)*20; g.y = 100 - (i-20)*40;
                if(i>22) { g.x = 80 + (i-22)*25; g.y = -20 + (i-22)*45; }
                g.group="A";
            }
            else { g.x = 220; g.y = (i-26)*60-120; g.group="1_2"; }
        });
    }

    function draw() {
        ctx.fillStyle = `rgba(0, 0, 0, ${currentScene === 'WARP' ? 0.2 : 1})`;
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        if(shake > 0) {
            ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);
            shake *= 0.9;
        }
        ctx.translate(w/2, h/2);

        stars.forEach((s, i) => {
            s.z -= speed;
            if(s.z <= 0) s.z = w;
            let x = s.x * (w/s.z);
            let y = s.y * (h/s.z);

            if(currentScene === 'CONSTELLATION' && i < 30) {
                let g = girls[i];
                if(currentScene === 'VORTEX') {
                    let angle = 0.15;
                    let oldX = g.x;
                    g.x = (g.x * Math.cos(angle) - g.y * Math.sin(angle)) * 0.94;
                    g.y = (oldX * Math.sin(angle) + g.y * Math.cos(angle)) * 0.94;
                    if(Math.abs(g.x) < 2) currentScene = 'SUPERNOVA';
                }
                s.x += (g.x - s.x) * 0.1; s.y += (g.y - s.y) * 0.1; s.z = 1000;
                
                // Vẽ ngôi sao lung linh
                ctx.shadowBlur = 15; ctx.shadowColor = "#00d4ff";
                ctx.fillStyle = g.unlocked ? "#ff0080" : "#fff";
                ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            } else {
                ctx.fillStyle = s.color;
                ctx.beginPath(); ctx.arc(x, y, (currentScene==='WARP'?2:1), 0, Math.PI*2); ctx.fill();
            }
        });

        if(currentScene === 'CONSTELLATION') drawLines();
        ctx.restore();

        if(currentScene === 'SUPERNOVA') {
            overlayOpacity += 0.02;
            ctx.fillStyle = `rgba(255, 255, 255, ${overlayOpacity})`;
            ctx.fillRect(0, 0, w, h);
            if(overlayOpacity >= 1) location.reload(); // Hoặc chuyển trang cô giáo
        }

        requestAnimationFrame(draw);
    }

    function drawLines() {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        girls.forEach((g, i) => {
            if(i > 0 && g.group === girls[i-1].group) {
                ctx.moveTo(girls[i-1].x, girls[i-1].y);
                ctx.lineTo(g.x, g.y);
            }
        });
        ctx.stroke();
    }

    // LOGIC ĐIỀU KHIỂN
    function startJourney() {
        if(document.getElementById('main-pass').value.toUpperCase() === '10A1') {
            document.getElementById('scene-login').classList.add('hidden');
            setTimeout(() => {
                currentScene = 'WARP'; speed = 50;
                setTimeout(() => { currentScene = 'CONSTELLATION'; speed = 0.2; }, 3000);
            }, 800);
        }
    }

    canvas.addEventListener('click', (e) => {
        if(currentScene !== 'CONSTELLATION') return;
        girls.forEach(g => {
            let dx = e.clientX - w/2 - g.x, dy = e.clientY - h/2 - g.y;
            if(Math.sqrt(dx*dx + dy*dy) < 30) {
                window.selectedGirl = g;
                openPortal(g);
            }
        });
    });

    function openPortal(g) {
        document.getElementById('scene-unlock').classList.remove('hidden');
        document.getElementById('girl-name').innerText = g.name;
        document.getElementById('girl-img').src = g.img;
        document.getElementById('girl-pass').value = "";
        
        if(g.unlocked) {
            showPrivateContent(g);
        } else {
            document.getElementById('lock-section').style.display = 'block';
            document.getElementById('private-view').style.display = 'none';
        }
    }

    function unlockGirl() {
        let pass = document.getElementById('girl-pass').value;
        if(pass === window.selectedGirl.pass) {
            window.selectedGirl.unlocked = true;
            showPrivateContent(window.selectedGirl);
        } else {
            alert("Mật khẩu bí mật không đúng rồi!");
        }
    }

    function showPrivateContent(g) {
        document.getElementById('lock-section').style.display = 'none';
        document.getElementById('private-view').style.display = 'block';
        document.getElementById('canva-img').src = g.canva;
    }

    function closePortal() {
        document.getElementById('scene-unlock').classList.add('hidden');
        checkEndGame();
    }

    function checkEndGame() {
        let count = girls.filter(g => g.unlocked).length;
        if(count >= 30) {
            setTimeout(() => {
                currentScene = 'VORTEX';
                shake = 20;
            }, 1000);
        }
    }

    window.onresize = init;
    init(); draw();
</script>
</body>
</html>
