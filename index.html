<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>10A1 - The Ultimate Cosmic Journey</title>
    <style>
        :root {
            --primary-cyan: #00ffff;
            --deep-space: #00050a;
            --star-white: #ffffff;
            --neon-pink: #ff00ff;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--deep-space); font-family: 'Segoe UI', Roboto, sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* UI Styling */
        #ui-container {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(0,20,40,0.2) 0%, rgba(0,0,0,0.9) 100%);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .title-wrapper { text-align: center; margin-bottom: 50px; }
        .main-title {
            color: var(--star-white); font-size: 5rem; font-weight: 900; letter-spacing: 20px;
            text-shadow: 0 0 20px var(--primary-cyan), 0 0 40px var(--primary-cyan);
            margin: 0; animation: titleFloat 3s ease-in-out infinite;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-10px); filter: brightness(1.3); }
        }

        .input-group { position: relative; margin-bottom: 30px; }
        .cosmic-input {
            background: rgba(255, 255, 255, 0.05); border: 2px solid var(--primary-cyan);
            border-radius: 50px; color: white; padding: 15px 40px; width: 280px;
            font-size: 1.2rem; text-align: center; outline: none;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .cosmic-input:focus { box-shadow: 0 0 30px rgba(0, 255, 255, 0.4); background: rgba(255, 255, 255, 0.1); }

        .btn-launch {
            background: var(--primary-cyan); color: black; border: none;
            padding: 18px 60px; border-radius: 50px; font-weight: bold;
            font-size: 1.3rem; cursor: pointer; letter-spacing: 3px;
            box-shadow: 0 0 20px var(--primary-cyan); transition: 0.4s;
        }
        .btn-launch:hover { transform: scale(1.1) rotate(1deg); box-shadow: 0 0 50px var(--star-white); }

        /* Card Information */
        #detail-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            z-index: 200; width: 450px; padding: 40px; border-radius: 30px;
            background: linear-gradient(135deg, rgba(10, 25, 45, 0.95), rgba(25, 10, 35, 0.95));
            border: 1px solid var(--primary-cyan); color: white; text-align: center;
            opacity: 0; pointer-events: none; transition: 0.5s;
        }
        #detail-card.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .card-name { font-size: 3rem; color: var(--primary-cyan); margin-bottom: 15px; }
        .card-wish { font-size: 1.4rem; line-height: 1.6; font-style: italic; color: #ddd; }

        .hidden { opacity: 0 !important; pointer-events: none !important; transform: scale(1.5) !important; }
    </style>
</head>
<body>

<canvas id="mainCanvas"></canvas>

<div id="ui-container">
    <div class="title-wrapper">
        <h1 class="main-title">GALAXY 10A1</h1>
        <p style="color: var(--primary-cyan); letter-spacing: 5px; margin-top: 10px;">A COSMIC TRIBUTE TO OUR GIRLS</p>
    </div>
    <div class="input-group">
        <input type="password" id="passkey" class="cosmic-input" placeholder="MẬT MÃ KHÔNG GIAN (83)">
    </div>
    <button class="btn-launch" onclick="Universe.startWarp()">KHỞI ĐỘNG VŨ TRỤ</button>
</div>

<div id="detail-card" onclick="Universe.closeCard()">
    <div class="card-name" id="gName"></div>
    <div class="card-wish" id="gWish"></div>
    <div style="margin-top: 30px; font-size: 0.8rem; opacity: 0.5;">[ CHẠM ĐỂ ĐÓNG ]</div>
</div>

<script>
/**
 * UNIVERSE ENGINE v5.0 - PRO EDITION
 */
const girlsData = [
    {n: "Bảo Ngọc", w: "Ngọc quý 10A1, luôn tỏa sáng nhé!"}, {n: "Hà Phương", w: "Dịu dàng như nắng ban mai."},
    {n: "Tuyết Mai", w: "Xinh đẹp kiên cường như nhành Mai."}, {n: "Diệp Chi", w: "Mãi rạng rỡ và tràn đầy sức sống."},
    {n: "Khánh Huyền", w: "Nụ cười của Huyền là đẹp nhất."}, {n: "Ngọc Lan", w: "Hương thơm dịu ngọt của cả lớp."},
    {n: "Phương Thảo", w: "Mọi sự bình an luôn đến với em."}, {n: "Thu Hà", w: "Trong trẻo như mùa thu Hà Nội."},
    {n: "Hà Chi", w: "Cá tính và tỏa sáng rực rỡ nhé."}, {n: "Thùy Linh", w: "Hạnh phúc luôn nở hoa trên môi."},
    {n: "Huyền Trang", w: "Xinh đẹp, giỏi giang và đầy tự tin."}, {n: "Phương Linh", w: "Chúc em vạn sự như ý."},
    {n: "Quỳnh Anh", w: "Kiêu sa như đóa hoa Quỳnh."}, {n: "Mai Hương", w: "Mãi giữ nét duyên thầm này nhé."},
    {n: "Hà My", w: "Cô gái nhỏ đáng yêu nhất quả đất."}, {n: "Lan Anh", w: "Tỏa sáng rực rỡ mỗi ngày."},
    {n: "Thùy Dương", w: "Ấm áp và tràn đầy yêu thương."}, {n: "Yến Nhi", w: "Bay cao với ước mơ của mình."},
    {n: "Bảo Quyên", w: "Xinh đẹp và vô cùng trang nhã."}, {n: "Huyền Diệu", w: "Cuộc sống sẽ luôn kỳ diệu với em."},
    {n: "Trúc Mai", w: "Mạnh mẽ và đầy khí chất."}, {n: "Tú Anh", w: "Thông minh, xinh đẹp, rạng ngời."},
    {n: "Ngọc Mai", w: "Quý giá như chính cái tên của em."}, {n: "Hoàng Yến", w: "Luôn vui tươi như chú chim nhỏ."},
    {n: "Ngọc Diệp", w: "Lá ngọc cành vàng của 10A1."}, {n: "Hương Giang", w: "Êm đềm và sâu sắc như dòng sông."},
    {n: "Bảo Chi", w: "Trân trọng từng phút giây hạnh phúc."}, {n: "Mai Phương", w: "Đích đến rạng rỡ đang chờ em."},
    {n: "Hồng Nhung", w: "Đóa hoa hồng rực rỡ nhất."}, {n: "Hoài Thương", w: "Đáng yêu và được mọi người quý mến."}
];

class Meteor {
    constructor(w, h) { this.w = w; this.h = h; this.reset(); }
    reset() {
        this.x = Math.random() * this.w * 1.5;
        this.y = -100;
        this.size = Math.random() * 2 + 1;
        this.speed = Math.random() * 15 + 10;
        this.len = Math.random() * 150 + 50;
        this.opacity = 0;
    }
    update() {
        this.x -= this.speed;
        this.y += this.speed;
        if (this.x < -this.len || this.y > this.h + this.len) this.reset();
    }
    draw(ctx) {
        ctx.save();
        let grad = ctx.createLinearGradient(this.x, this.y, this.x + this.len, this.y - this.len);
        grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
        grad.addColorStop(1, 'transparent');
        ctx.strokeStyle = grad;
        ctx.lineWidth = this.size;
        ctx.beginPath(); ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.len, this.y - this.len); ctx.stroke();
        ctx.restore();
    }
}

const Universe = {
    canvas: document.getElementById('mainCanvas'),
    stars: [], meteors: [], constellationStars: [],
    speed: 1, targetSpeed: 1, warping: false,
    
    init() {
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        for(let i=0; i<1800; i++) this.stars.push({
            x: Math.random() * this.w - this.w/2,
            y: Math.random() * this.h - this.h/2,
            z: Math.random() * this.w, pz: 0
        });
        for(let i=0; i<5; i++) this.meteors.push(new Meteor(this.w, this.h));
        this.animate();
        window.addEventListener('resize', () => this.resize());
    },

    resize() { this.w = this.canvas.width = window.innerWidth; this.h = this.canvas.height = window.innerHeight; },

    startWarp() {
        if(document.getElementById('passkey').value !== "83") return alert("Mật mã: 83");
        document.getElementById('ui-container').classList.add('hidden');
        this.warping = true;
        this.targetSpeed = 55;
        setTimeout(() => this.endWarp(), 2500);
    },

    endWarp() {
        this.targetSpeed = 0.5;
        setTimeout(() => {
            this.warping = false;
            this.createConstellation();
        }, 2000);
    },

    createConstellation() {
        const cx = this.w/2, cy = this.h/2, s = Math.min(this.w, this.h) / 10;
        const pts = [
            // 1
            {x:cx-4*s, y:cy-1.5*s}, {x:cx-4*s, y:cy}, {x:cx-4*s, y:cy+1.5*s},
            // 0
            {x:cx-2.5*s, y:cy-1.5*s}, {x:cx-1*s, y:cy-1.5*s}, {x:cx-1*s, y:cy+1.5*s}, {x:cx-2.5*s, y:cy+1.5*s}, {x:cx-2.5*s, y:cy}, {x:cx-1*s, y:cy},
            // A
            {x:cx+0.5*s, y:cy+1.5*s}, {x:cx+1.2*s, y:cy-1.5*s}, {x:cx+1.9*s, y:cy+1.5*s}, {x:cx+0.8*s, y:cy+0.2*s}, {x:cx+1.6*s, y:cy+0.2*s},
            // 1
            {x:cx+3.4*s, y:cy-1.5*s}, {x:cx+3.4*s, y:cy}, {x:cx+3.4*s, y:cy+1.5*s}
        ];
        
        this.constellationStars = girlsData.map((g, i) => {
            let target = pts[i % pts.length];
            return { ...g, x: target.x, y: target.y, ox: target.x, oy: target.y, a: Math.random()*6, glow: 0 };
        });

        this.canvas.onclick = (e) => {
            this.constellationStars.forEach(s => {
                if(Math.hypot(e.clientX - s.x, e.clientY - s.y) < 30) {
                    document.getElementById('gName').innerText = s.n;
                    document.getElementById('gWish').innerText = s.w;
                    document.getElementById('detail-card').classList.add('active');
                }
            });
        };
    },

    closeCard() { document.getElementById('detail-card').classList.remove('active'); },

    animate() {
        // Tinh chỉnh tốc độ mượt mà
        this.speed += (this.targetSpeed - this.speed) * 0.05;
        
        // Vẽ nền vũ trụ sâu
        let grad = this.ctx.createRadialGradient(this.w/2, this.h/2, 0, this.w/2, this.h/2, this.w);
        grad.addColorStop(0, '#001020'); grad.addColorStop(1, '#000000');
        this.ctx.fillStyle = grad; this.ctx.fillRect(0, 0, this.w, this.h);

        // Sao băng
        if(this.speed < 10) this.meteors.forEach(m => { m.update(); m.draw(this.ctx); });

        // Hyper-space stars
        this.stars.forEach(s => {
            s.pz = s.z; s.z -= this.speed;
            if(s.z < 1) { s.z = this.w; s.pz = s.z; }
            let sx = (s.x / s.z) * this.w + this.w/2;
            let sy = (s.y / s.z) * this.h + this.h/2;
            let px = (s.x / s.pz) * this.w + this.w/2;
            let py = (s.y / s.pz) * this.h + this.h/2;

            this.ctx.strokeStyle = `rgba(255, 255, 255, ${Math.min(1, 1 - s.z/this.w)})`;
            this.ctx.lineWidth = (1 - s.z/this.w) * 2;
            this.ctx.beginPath(); this.ctx.moveTo(px, py); this.ctx.lineTo(sx, sy); this.ctx.stroke();
        });

        // Constellation 10A1
        if(this.constellationStars.length > 0 && this.speed < 2) {
            this.ctx.beginPath();
            this.ctx.strokeStyle = 'rgba(0, 255, 255, 0.15)';
            // Vẽ đường nối
            for(let i=0; i<this.constellationStars.length-1; i++) {
                let s1 = this.constellationStars[i], s2 = this.constellationStars[i+1];
                if(Math.hypot(s1.ox-s2.ox, s1.oy-s2.oy) < 120) {
                    this.ctx.moveTo(s1.x, s1.y); this.ctx.lineTo(s2.x, s2.y);
                }
            }
            this.ctx.stroke();

            this.constellationStars.forEach(s => {
                s.a += 0.04;
                s.x = s.ox + Math.sin(s.a)*5;
                s.y = s.oy + Math.cos(s.a)*5;
                
                this.ctx.shadowBlur = 15; this.ctx.shadowColor = "#0ff";
                this.ctx.fillStyle = "#fff";
                this.ctx.beginPath(); this.ctx.arc(s.x, s.y, 4, 0, Math.PI*2); this.ctx.fill();
                this.ctx.shadowBlur = 0;
            });
        }

        requestAnimationFrame(() => this.animate());
    }
};

Universe.init();
</script>
</body>
</html>
