<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>10A1 Universe - Final Visuals</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; }
        .layer { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            flex-direction: column; z-index: 10; background: rgba(0,0,0,0.85);
            transition: 1s;
        }
        .hidden { opacity: 0; pointer-events: none !important; }
        
        /* Giao diện Portal tối giản theo ảnh ông gửi */
        .portal-card { 
            background: #111; border: 1px solid rgba(255,255,255,0.2); 
            padding: 40px; text-align: center; border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.1);
        }
        input { 
            background: #222; border: 1px solid #444; color: #fff; 
            padding: 12px; border-radius: 5px; width: 200px; outline: none;
        }
        button { 
            padding: 12px 30px; border-radius: 5px; border: none;
            background: linear-gradient(90deg, #00d4ff, #ff0080);
            color: #fff; font-weight: bold; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="scene-login" class="layer">
    <div class="portal-card">
        <h1 style="letter-spacing: 10px; font-weight: 300;">10A1 PORTAL</h1>
        <input type="password" id="pass" placeholder="MẬT KHẨU LỚP">
        <br>
        <button onclick="runLogin()">KÍCH HOẠT HÀNH TRÌNH</button>
    </div>
</div>

<div id="star-portal" class="layer hidden">
    <div class="portal-card" style="max-width: 350px;">
        <img id="girl-img" src="" style="width: 120px; height: 120px; border-radius: 50%; border: 2px solid #fff; margin-bottom: 15px;">
        <h2 id="girl-name-display" style="margin: 0 0 15px 0;"></h2>
        <div id="lock-section">
            <input type="password" id="private-pass" placeholder="Nhập mã riêng...">
            <button onclick="checkPrivatePass()">MỞ KHÓA</button>
        </div>
        <div id="private-content" class="hidden">
            <div id="canva-frame" style="height: 350px; background: #000; display:flex; align-items:center;">
                <p>DÁN ẢNH CANVA VÀO ĐÂY</p>
            </div>
            <button onclick="closeStarPortal()">HOÀN TẤT</button>
        </div>
    </div>
</div>

<script>
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');
let w, h, stars = [], currentScene = 'IDLE';
let speed = 0.2, viewed = 0, isCollapsing = false, shake = 0;

const girls = Array.from({length: 30}, (_, i) => ({
    name: `Bạn nữ ${i+1}`, pass: "123", img: "https://via.placeholder.com/150", 
    active: true, x: 0, y: 0, group: ""
}));

function init() {
    w = cvs.width = window.innerWidth;
    h = cvs.height = window.innerHeight;
    stars = Array.from({length: 400}, () => ({
        x: Math.random()*w - w/2, y: Math.random()*h - h/2, z: Math.random()*w
    }));
    setup10A1();
}

// Xếp chữ 10A1 nghệ thuật (Tách biệt các nhóm)
function setup10A1() {
    girls.forEach((g, i) => {
        if(i < 6) { g.x = -250; g.y = i*50-125; g.group="1"; } // Số 1
        else if(i < 18) { // Số 0
            let a = (i-6)*(Math.PI*2/12);
            g.x = -80 + 70*Math.cos(a); g.y = 100*Math.sin(a); g.group="0";
        }
        else if(i < 24) { // Chữ A
            g.x = 80 + (i-18)*20; g.y = 100 - (i-18)*40;
            if(i>20) { g.x = 80 + (i-21)*20; g.y = -20 + (i-21)*40; }
            g.group="A";
        }
        else { g.x = 240; g.y = (i-24)*50-125; g.group="1_2"; } // Số 1 cuối
    });
}

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
    
    ctx.save();
    // Hiệu ứng rung màn hình (Scene 8)
    if(shake > 0) {
        ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
        shake *= 0.95;
    }
    ctx.translate(w/2, h/2);

    if (currentScene === 'CONSTELLATION') drawConstellationLines();

    stars.forEach((s, i) => {
        s.z -= speed;
        if(s.z <= 0) s.z = w;
        let x = s.x * (w/s.z);
        let y = s.y * (h/s.z);

        if(currentScene === 'CONSTELLATION' && i < 30) {
            let g = girls[i];
            if(isCollapsing) {
                // Xoay vòng gom lại (Vortex)
                let angle = 0.1;
                let oldX = g.x;
                g.x = (g.x * Math.cos(angle) - g.y * Math.sin(angle)) * 0.95;
                g.y = (oldX * Math.sin(angle) + g.y * Math.cos(angle)) * 0.95;
                shake = 15; // Bắt đầu rung
                if(Math.abs(g.x) < 2) currentScene = 'SUPERNOVA';
            }
            s.x += (g.x - s.x) * 0.1; s.y += (g.y - s.y) * 0.1; s.z = 1000;
            if(g.active) {
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
                ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        } else {
            ctx.fillStyle = (currentScene==='WARP') ? '#fff' : '#444';
            ctx.beginPath(); ctx.arc(x, y, (currentScene==='WARP'?2:1), 0, Math.PI*2); ctx.fill();
        }
        s.px = x; s.py = y;
    });

    if(currentScene === 'SUPERNOVA') drawSupernova();
    ctx.restore();
    requestAnimationFrame(draw);
}

function drawConstellationLines() {
    ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
    ctx.beginPath();
    girls.forEach((g, i) => {
        if(i > 0 && g.group === girls[i-1].group && g.active && girls[i-1].active) {
            ctx.moveTo(girls[i-1].x, girls[i-1].y);
            ctx.lineTo(g.x, g.y);
        }
    });
    ctx.stroke();
}

// Chuyển cảnh logic
function runLogin() {
    if(document.getElementById('pass').value === '10A1') {
        document.getElementById('scene-login').classList.add('hidden');
        currentScene = 'WARP'; speed = 40;
        setTimeout(() => { currentScene = 'CONSTELLATION'; speed = 0.2; }, 3000);
    }
}

cvs.addEventListener('click', (e) => {
    if(currentScene !== 'CONSTELLATION') return;
    girls.forEach(g => {
        let dx = e.clientX - w/2 - g.x, dy = e.clientY - h/2 - g.y;
        if(Math.sqrt(dx*dx + dy*dy) < 25 && g.active) {
            window.cur = g;
            document.getElementById('star-portal').classList.remove('hidden');
            document.getElementById('girl-name-display').innerText = g.name;
            document.getElementById('girl-img').src = g.img;
        }
    });
});

function checkPrivatePass() {
    if(document.getElementById('private-pass').value === window.cur.pass) {
        document.getElementById('lock-section').classList.add('hidden');
        document.getElementById('private-content').classList.remove('hidden');
    } else alert("Sai mật khẩu!");
}

function closeStarPortal() {
    document.getElementById('star-portal').classList.add('hidden');
    window.cur.active = false; viewed++;
    if(viewed >= 30) {
        girls.forEach(g => g.active = true);
        setTimeout(() => { isCollapsing = true; }, 1000);
    }
}

let snSize = 0;
function drawSupernova() {
    snSize += 40;
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(0, 0, snSize, 0, Math.PI*2); ctx.fill();
    if(snSize > w) location.reload(); // Hoặc hiện trang của cô
}

window.onresize = init; init(); draw();
</script>
</body>
</html>
