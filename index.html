<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>30 Vũ Trụ Riêng</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.star {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.star:hover {
    transform: scale(1.15);
}

.star::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, white 0%, #8ee6ff 40%, rgba(142,230,255,0.2) 70%, transparent 85%);
    animation: pulse 2.5s infinite ease-in-out;
}

.star::after {
    content: "";
    position: absolute;
    width: 220%;
    height: 220%;
    top: -60%;
    left: -60%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(142,230,255,0.4), transparent 70%);
    filter: blur(25px);
}

@keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.7; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.7; }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* Background stars */
let starsBg = [];
for (let i = 0; i < 200; i++) {
    starsBg.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5
    });
}

function drawBackground() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.6)";
    starsBg.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(drawBackground);
}

drawBackground();

/* Main stars */
let totalStars = 30;
let centerX = window.innerWidth / 2;
let centerY = window.innerHeight / 2;

let orbitStars = [];

/* First star */
let firstStar = document.createElement("div");
firstStar.className = "star";
firstStar.style.width = "45px";
firstStar.style.height = "45px";
firstStar.style.left = (centerX - 22) + "px";
firstStar.style.top = (centerY - 22) + "px";
document.body.appendChild(firstStar);

setTimeout(() => {

    for (let i = 1; i < totalStars; i++) {

        let star = document.createElement("div");
        star.className = "star";

        let size = 25 + Math.random() * 20;
        star.style.width = size + "px";
        star.style.height = size + "px";

        let finalX = Math.random() * window.innerWidth;
        let finalY = Math.random() * window.innerHeight;

        star.style.left = finalX + "px";
        star.style.top = finalY + "px";

        document.body.appendChild(star);

        orbitStars.push({
            element: star,
            baseX: finalX,
            baseY: finalY,
            angle: Math.random() * Math.PI * 2,
            speed: 0.01 + Math.random() * 0.01,
            radius: 10 + Math.random() * 20
        });
    }

    animateOrbit();

}, 3000);

function animateOrbit() {
    orbitStars.forEach(s => {
        s.angle += s.speed;

        let x = s.baseX + Math.cos(s.angle) * s.radius;
        let y = s.baseY + Math.sin(s.angle) * s.radius;

        s.element.style.left = x + "px";
        s.element.style.top = y + "px";
    });

    requestAnimationFrame(animateOrbit);
}
</script>

</body>
</html>
