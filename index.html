<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>8/3 - 10A1 Cosmic Constellation</title>
    <style>
        :root { --cyan-glow: #00ffff; --pink-glow: #ff75c3; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .ui-layer { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 10; transition: 1s; }
        #login-panel { text-align: center; color: white; }
        .cosmic-input { 
            background: rgba(255,255,255,0.1); border: 1px solid var(--cyan-glow); 
            color: white; padding: 10px; text-align: center; border-radius: 20px; outline: none;
        }
        .launch-btn {
            margin-top: 20px; padding: 12px 40px; border-radius: 25px; border: none;
            background: var(--cyan-glow); color: black; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px var(--cyan-glow); transition: 0.3s;
        }
        .launch-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px white; }
        .hidden { opacity: 0; pointer-events: none; }
        
        /* Overlay thông tin bạn nữ */
        .info-overlay { 
            position: fixed; inset: 0; display: none; justify-content: center; 
            align-items: center; background: rgba(0,0,0,0.85); z-index: 100; opacity: 0; transition: 0.5s;
        }
        .galaxy-card {
            background: rgba(15, 15, 35, 0.9); border: 2px solid var(--cyan-glow);
            padding: 40px; border-radius: 20px; text-align: center; color: white; max-width: 400px;
        }
    </style>
</head>
<body>

    <canvas id="universe"></canvas>

    <div class="ui-layer" id="gate-ui">
        <div id="login-panel">
            <h1 style="letter-spacing: 10px; text-shadow: 0 0 20px var(--cyan-glow);">GALAXY 10A1</h1>
            <input type="password" id="gate-pass" class="cosmic-input" placeholder="MẬT MÃ 83">
            <br>
            <button class="launch-btn" onclick="CosmicEngine.warpDrive()">KHỞI ĐỘNG</button>
        </div>
    </div>

    <div class="info-overlay" id="detail-overlay" onclick="CosmicEngine.closeDetail()">
        <div class="galaxy-card">
            <h2 id="girl-name" style="color: var(--cyan-glow); font-size: 2em; margin-bottom: 10px;"></h2>
            <p id="girl-wish" style="font-size: 1.2em; line-height: 1.6; color: #ddd;"></p>
            <p style="margin-top: 20px; font-size: 0.8em; color: var(--pink-glow);">[ Click bất kỳ để đóng ]</p>
        </div>
    </div>

<script>
    const CosmicConfig = {
        starCount: 1500,
        baseSpeed: 0.3,
        warpSpeed: 45,
        gatePassword: "83"
    };

    // Sao nền chuyển động
    class Particle {
        constructor(w, h) { this.w = w; this.h = h; this.init(); }
        init() {
            this.x = Math.random() * this.w - this.w / 2;
            this.y = Math.random() * this.h - this.h / 2;
            this.z = Math.random() * this.w;
            this.pz = this.z;
        }
        update(speed) {
            this.pz = this.z; this.z -= speed;
            if (this.z < 1) { this.init(); this.pz = this.z; }
        }
        draw(ctx, w, h) {
            let sx = (this.x / this.z) * w + w / 2;
            let sy = (this.y / this.z) * h + h / 2;
            let px = (this.x / this.pz) * w + w / 2;
            let py = (this.y / this.pz) * h + h / 2;
            ctx.strokeStyle = `rgba(255, 255, 255, ${1 - this.z / w})`;
            ctx.lineWidth = (1 - this.z / w) * 2;
            ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy); ctx.stroke();
        }
    }

    // Sao của các bạn nữ trong chòm sao
    class GirlStar {
        constructor(id) {
            this.id = id;
            const list = [
                { n: "Bảo Ngọc", w: "Viên ngọc quý của lớp, luôn rạng rỡ nhé!" },
                { n: "Hà Phương", w: "Chúc Phương luôn giữ mãi nét đáng yêu." },
                { n: "Tuyết Mai", w: "Xinh đẹp và mạnh mẽ như đóa mai trong tuyết." },
                { n: "Diệp Chi", w: "Tràn đầy năng lượng và niềm vui Chi nhé!" },
                { n: "Khánh Huyền", w: "Mãi nở nụ cười xinh xắn trên môi nha!" },
                { n: "Ngọc Lan", w: "Hương thơm ngát và dịu dàng như loài hoa lan." },
                { n: "Phương Thảo", w: "Chúc Thảo luôn gặp nhiều may mắn." },
                { n: "Thu Hà", w: "Giữ mãi nét hồn nhiên và trong sáng nhé Hà." },
                { n: "Hà Chi", w: "Tỏa sáng theo cách riêng của em!" },
                { n: "Thùy Linh", w: "Dịu dàng, nết na và luôn hạnh phúc." },
                { n: "Huyền Trang", w: "Cứ mãi xinh đẹp và tỏa sáng nhé Trang." },
                { n: "Phương Linh", w: "Niềm vui sẽ luôn bên em, Phương Linh." },
                { n: "Quỳnh Anh", w: "Rạng rỡ như loài hoa quỳnh về đêm." },
                { n: "Mai Hương", w: "Mạnh mẽ và tỏa hương sắc cho đời." },
                { n: "Hà My", w: "Hồn nhiên và đáng yêu nhất hệ mặt trời!" },
                { n: "Lan Anh", w: "Chúc Lan Anh vạn điều tốt lành." },
                { n: "Thùy Dương", w: "Dịu dàng như tên gọi của em vậy." },
                { n: "Yến Nhi", w: "Sải cánh bay cao như chim yến nhỏ." },
                { n: "Bảo Quyên", w: "Xinh đẹp, quý phái và luôn tự tin." },
                { n: "Huyền Diệu", w: "Cuộc sống của em sẽ luôn diệu kỳ." },
                { n: "Trúc Mai", w: "Mạnh mẽ như trúc, rạng rỡ như mai." },
                { n: "Tú Anh", w: "Thông minh và luôn tỏa sáng rực rỡ." },
                { n: "Ngọc Mai", w: "Quý giá và xinh đẹp vô cùng." },
                { n: "Hoàng Yến", w: "Mãi giữ nét hồn nhiên này Yến nhé." },
                { n: "Ngọc Diệp", w: "Lá ngọc cành vàng của 10A1." },
                { n: "Hương Giang", w: "Dịu dàng như dòng sông xanh ngắt." },
                { n: "Bảo Chi", w: "Quý báu như vầng trăng sáng." },
                { n: "Mai Phương", w: "Rạng rỡ như ánh nắng ban mai." },
                { n: "Hồng Nhung", w: "Xinh đẹp và kiêu sa như đóa hồng." },
                { n: "Hoài Thương", w: "Mãi là cô gái đáng yêu của lớp nhé." }
            ];
            const p = list[id] || { n: `Bạn Nữ ${id + 1}`, w: "Chúc bạn 8/3 tuyệt vời!" };
            this.name = p.n; this.wish = p.w;
            this.x = 0; this.y = 0;
            this.size = 3;
        }
        draw(ctx) {
            ctx.shadowBlur = 15; ctx.shadowColor = "white";
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    const CosmicEngine = {
        canvas: null, ctx: null, stars: [], femaleStars: [], speed: CosmicConfig.baseSpeed,
        init() {
            this.canvas = document.getElementById('universe');
            this.ctx = this.canvas.getContext('2d');
            this.resize();
            for(let i=0; i < CosmicConfig.starCount; i++) this.stars.push(new Particle(this.canvas.width, this.canvas.height));
            window.addEventListener('resize', () => this.resize());
            this.render();
        },
        resize() {
            this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight;
            if(this.femaleStars.length > 0) this.setupConstellation();
        },
        setupConstellation() {
            const w = this.canvas.width, h = this.canvas.height;
            const cx = w/2, cy = h/2, sx = 70, sy = 100;
            // Tọa độ các điểm tạo chữ 10A1
            const pts = [
                {x: cx-200, y: cy-sy}, {x: cx-200, y: cy+sy}, // Số 1
                {x: cx-80, y: cy-sy}, {x: cx+20, y: cy-sy}, {x: cx+20, y: cy+sy}, {x: cx-80, y: cy+sy}, {x: cx-80, y: cy-sy}, // Số 0
                {x: cx+100, y: cy+sy}, {x: cx+160, y: cy-sy}, {x: cx+220, y: cy+sy}, // Chữ A (chéo)
                {x: cx+130, y: cy}, {x: cx+190, y: cy}, // Chữ A (gạch ngang)
                {x: cx+300, y: cy-sy}, {x: cx+300, y: cy+sy} // Số 1 cuối
            ];
            for(let i=0; i<this.femaleStars.length; i++) {
                let target = pts[i % pts.length];
                this.femaleStars[i].x = target.x + (Math.random()*10 - 5); // Thêm chút ngẫu nhiên cho tự nhiên
                this.femaleStars[i].y = target.y + (Math.random()*10 - 5);
            }
        },
        drawLines() {
            this.ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
            this.ctx.lineWidth = 1;
            const conn = [[0,1], [2,3], [3,4], [4,5], [5,2], [7,8], [8,9], [10,11], [12,13]];
            conn.forEach(c => {
                let s1 = this.femaleStars[c[0]], s2 = this.femaleStars[c[1]];
                if(s1 && s2) {
                    this.ctx.beginPath(); this.ctx.moveTo(s1.x, s1.y);
                    this.ctx.lineTo(s2.x, s2.y); this.ctx.stroke();
                }
            });
        },
        warpDrive() {
            if(document.getElementById('gate-pass').value === CosmicConfig.gatePassword) {
                document.getElementById('gate-ui').classList.add('hidden');
                let warp = setInterval(() => {
                    this.speed += 1.5;
                    if(this.speed >= CosmicConfig.warpSpeed) {
                        clearInterval(warp);
                        setTimeout(() => this.slowDown(), 1500);
                    }
                }, 50);
            } else { alert("Mật mã là 83!"); }
        },
        slowDown() {
            let slow = setInterval(() => {
                this.speed -= 1;
                if(this.speed <= CosmicConfig.baseSpeed) {
                    clearInterval(slow); this.speed = CosmicConfig.baseSpeed;
                    for(let i=0; i<30; i++) this.femaleStars.push(new GirlStar(i));
                    this.setupConstellation();
                    this.canvas.onclick = (e) => this.checkClick(e);
                }
            }, 100);
        },
        checkClick(e) {
            this.femaleStars.forEach(s => {
                if(Math.hypot(e.clientX - s.x, e.clientY - s.y) < 20) {
                    document.getElementById('girl-name').innerText = s.name;
                    document.getElementById('girl-wish').innerText = s.wish;
                    const o = document.getElementById('detail-overlay');
                    o.style.display = 'flex'; setTimeout(() => o.style.opacity = '1', 10);
                }
            });
        },
        closeDetail() {
            const o = document.getElementById('detail-overlay');
            o.style.opacity = '0'; setTimeout(() => o.style.display = 'none', 500);
        },
        render() {
            this.ctx.fillStyle = "black"; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
            this.stars.forEach(s => { s.update(this.speed); s.draw(this.ctx, this.canvas.width, this.canvas.height); });
            if(this.femaleStars.length > 0) {
                this.drawLines();
                this.femaleStars.forEach(fs => fs.draw(this.ctx));
            }
            requestAnimationFrame(() => this.render());
        }
    };
    window.onload = () => CosmicEngine.init();
</script>
</body>
</html>
