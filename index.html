<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>30 Vũ Trụ Riêng</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #050510 0%, #000000 80%);
    font-family: Arial, sans-serif;
}

/* Canvas background */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* Star */
.star {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.3s ease;
}

/* Hover phóng to */
.star:hover {
    transform: scale(1.2);
}

/* Core */
.star::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, white 0%, #9be7ff 40%, rgba(155,231,255,0.2) 70%, transparent 80%);
    animation: pulse 2s infinite ease-in-out;
}

/* Glow */
.star::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(155,231,255,0.4), transparent 70%);
    filter: blur(20px);
}

@keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.8; }
}

/* Text intro */
.intro-text {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 45%;
    color: white;
    font-size: 28px;
    opacity: 0;
    animation: fadeIn 3s forwards;
    animation-delay: 6s;
}

@keyframes fadeIn {
    to { opacity: 1; }
}
</style>
</head>

<body>

<canvas id="starsBg"></canvas>
<div class="intro-text">30 vũ trụ. 30 điều đặc biệt.</div>

<script>
const canvas = document.getElementById("starsBg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* Background tiny stars */
let bgStars = [];
for (let i = 0; i < 200; i++) {
    bgStars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5
    });
}

function drawBg() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    bgStars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
    requestAnimationFrame(drawBg);
}
drawBg();

/* Main stars */

let totalStars = 30;
let centerX = window.innerWidth / 2;
let centerY = window.innerHeight / 2;

/* 1 sao trung tâm trước */
let firstStar = document.createElement("div");
firstStar.className = "star";
firstStar.style.width = "40px";
firstStar.style.height = "40px";
firstStar.style.left = (centerX - 20) + "px";
firstStar.style.top = (centerY - 20) + "px";
document.body.appendChild(firstStar);

/* Sau 3s → các sao khác bay vào */
setTimeout(() => {
    for (let i = 1; i < totalStars; i++) {

        let star = document.createElement("div");
        star.className = "star";

        let size = 25 + Math.random() * 20;
        star.style.width = size + "px";
        star.style.height = size + "px";

        /* xuất hiện từ rìa màn hình */
        let angle = Math.random() * Math.PI * 2;
        let radius = Math.max(window.innerWidth, window.innerHeight);

        let startX = centerX + Math.cos(angle) * radius;
        let startY = centerY + Math.sin(angle) * radius;

        star.style.left = startX + "px";
        star.style.top = startY + "px";

        document.body.appendChild(star);

        /* animate vào vị trí */
        let finalX = Math.random() * window.innerWidth;
        let finalY = Math.random() * window.innerHeight;

        setTimeout(() => {
            star.style.transition = "all 2s ease";
            star.style.left = finalX + "px";
            star.style.top = finalY + "px";
        }, 100);
    }
}, 3000);
</script>

</body>
</html>
