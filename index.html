<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>8/3 - The Ultimate Universe</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif;
        }
        canvas { position: fixed; top: 0; left: 0; }
        
        /* Màn hình Login - Cổng Cyan huyền ảo */
        #login-gate {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #001a33 0%, #000 100%);
            transition: 2s;
        }
        .portal-core {
            width: 180px; height: 180px; border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #0ff 30%, transparent 70%);
            box-shadow: 0 0 100px #0ff, inset 0 0 50px #0ff;
            animation: rotatePortal 10s linear infinite;
            cursor: pointer; position: relative;
        }
        @keyframes rotatePortal { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        input {
            margin-top: 40px; background: rgba(0, 255, 255, 0.1); border: 1px solid #0ff;
            padding: 12px 20px; color: #fff; border-radius: 30px; text-align: center;
            outline: none; backdrop-filter: blur(10px); width: 250px; font-size: 1.1rem;
        }
        button {
            margin-top: 15px; padding: 10px 40px; border-radius: 30px; border: none;
            background: #0ff; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { box-shadow: 0 0 30px #0ff; transform: scale(1.1); }

        /* Khung thông tin Pink Galaxy */
        #personal-overlay {
            position: fixed; inset: 0; z-index: 200; display: none;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px);
            justify-content: center; align-items: center;
        }
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 117, 195, 0.2), rgba(143, 68, 173, 0.2));
            padding: 40px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center; width: 90%; max-width: 500px; color: #fff;
            box-shadow: 0 0 50px rgba(255, 117, 195, 0.3);
        }
        .avatar-circle {
            width: 160px; height: 160px; border-radius: 50%; border: 4px solid #fff;
            margin: 0 auto 20px; background-size: cover; background-position: center;
            box-shadow: 0 0 30px #ff75c3;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="sky"></canvas>
    
    <div id="login-gate">
        <div class="portal-core"></div>
        <h1 style="color:#0ff; text-shadow: 0 0 20px #0ff; letter-spacing: 5px;">CLASS UNIVERSE</h1>
        <input type="password" id="gatePass" placeholder="Nhập mã không gian...">
        <button onclick="enterUniverse()">OPEN</button>
    </div>

    <div id="personal-overlay">
        <div class="glass-card" id="step-1">
            <div id="prevAva" class="avatar-circle"></div>
            <h2 id="prevName">Tên</h2>
            <input type="password" id="girlPass" placeholder="Mã riêng của bạn...">
            <br><button onclick="verifyGirl()">MỞ KHÓA</button>
            <button onclick="closeOverlay()" style="background:none; color:white;">ĐÓNG</button>
        </div>
        <div class="glass-card hidden" id="step-2">
            <div id="finalAva" class="avatar-circle"></div>
            <h1 id="resName" style="color:#ff75c3"></h1>
            <p id="resDob"></p>
            <div style="text-align:left; background:rgba(0,0,0,0.3); padding:20px; border-radius:20px;">
                <p><strong>💌 Cảm nhận:</strong> <span id="resFeel"></span></p>
                <p><strong>🌸 Lời chúc:</strong> <span id="resWish"></span></p>
            </div>
            <button onclick="closeOverlay()" style="margin-top:20px">QUAY LẠI VŨ TRỤ</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('sky');
    const ctx = canvas.getContext('2d');
    let stars = [], meteors = [], femaleStars = [];
    let isUniverseOpen = false;
    const GATE_PASS = "83";

    // Dữ liệu 30 bạn nữ
    const girls = Array.from({ length: 30 }, (_, i) => ({
        id: i, name: `Bạn Nữ ${i+1}`, dob: "08/03/200X", 
        pass: "123", img: "img/default.jpg", 
        feel: "Tuyệt vời, thông minh!", wish: "Mãi xinh đẹp!"
    }));

    let selectedGirl = null;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Tạo sao nền li ti
        for(let i=0; i<600; i++) {
            stars.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                size: Math.random()*1.5, opacity: Math.random(), speed: Math.random()*0.2
            });
        }
    }

    function createMeteor() {
        if(Math.random() < 0.02) {
            meteors.push({
                x: Math.random()*canvas.width, y: -20,
                len: Math.random()*80 + 50, speed: Math.random()*10 + 5,
                opacity: 1
            });
        }
    }

    function draw() {
        // Tạo hiệu ứng mờ dần để tạo vệt sao (Trail)
        ctx.fillStyle = isUniverseOpen ? "rgba(0, 5, 15, 0.2)" : "rgba(0, 0, 0, 0.2)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Vẽ sao nền
        ctx.fillStyle = "white";
        stars.forEach(s => {
            ctx.globalAlpha = s.opacity;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
            ctx.fill();
            s.y += s.speed;
            if(s.y > canvas.height) s.y = 0;
        });

        // Vẽ sao băng
        meteors.forEach((m, i) => {
            ctx.strokeStyle = "rgba(255, 255, 255, " + m.opacity + ")";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(m.x, m.y);
            ctx.lineTo(m.x - m.len, m.y + m.len);
            ctx.stroke();
            m.x += m.speed; m.y += m.speed; m.opacity -= 0.01;
            if(m.opacity <= 0) meteors.splice(i, 1);
        });

        // Vẽ 30 ngôi sao sinh động (Nếu đã mở vũ trụ)
        if(isUniverseOpen) {
            femaleStars.forEach(fs => {
                // Hiệu ứng Glow rực rỡ
                let grad = ctx.createRadialGradient(fs.x, fs.y, 0, fs.x, fs.y, fs.glowSize);
                grad.addColorStop(0, "white");
                grad.addColorStop(0.2, fs.color);
                grad.addColorStop(1, "transparent");
                
                ctx.globalAlpha = fs.opacity;
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(fs.x, fs.y, fs.glowSize, 0, Math.PI*2);
                ctx.fill();

                // Lấp lánh
                fs.glowSize += fs.pulse;
                if(fs.glowSize > 35 || fs.glowSize < 15) fs.pulse *= -1;
            });
        }

        createMeteor();
        requestAnimationFrame(draw);
    }

    function enterUniverse() {
        if(document.getElementById('gatePass').value === GATE_PASS) {
            document.getElementById('login-gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-gate').style.display = 'none';
                isUniverseOpen = true;
                // Tạo 30 ngôi sao thực tế tại vị trí ngẫu nhiên
                girls.forEach(g => {
                    femaleStars.push({
                        x: Math.random()*(canvas.width - 100) + 50,
                        y: Math.random()*(canvas.height - 100) + 50,
                        glowSize: Math.random()*20 + 10,
                        color: Math.random() > 0.5 ? "#0ff" : "#f0f",
                        opacity: 1, pulse: 0.2, girl: g
                    });
                });
            }, 2000);
        } else alert("Sai mã!");
    }

    // Xử lý click vào sao
    window.addEventListener('click', (e) => {
        if(!isUniverseOpen) return;
        femaleStars.forEach(fs => {
            let dist = Math.hypot(e.clientX - fs.x, e.clientY - fs.y);
            if(dist < 30) {
                selectedGirl = fs.girl;
                openOverlay();
            }
        });
    });

    function openOverlay() {
        document.getElementById('personal-overlay').style.display = 'flex';
        document.getElementById('step-1').classList.remove('hidden');
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('prevAva').style.backgroundImage = `url(${selectedGirl.img})`;
        document.getElementById('prevName').innerText = selectedGirl.name;
    }

    function verifyGirl() {
        if(document.getElementById('girlPass').value === selectedGirl.pass) {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('finalAva').style.backgroundImage = `url(${selectedGirl.img})`;
            document.getElementById('resName').innerText = selectedGirl.name;
            document.getElementById('resDob').innerText = "Sinh ngày: " + selectedGirl.dob;
            document.getElementById('resFeel').innerText = selectedGirl.feel;
            document.getElementById('resWish').innerText = selectedGirl.wish;
        } else alert("Mật khẩu riêng sai rồi!");
    }

    function closeOverlay() {
        document.getElementById('personal-overlay').style.display = 'none';
    }

    init();
    draw();
</script>
</body>
</html>
