<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GALAXY 10A1 - Cinematic Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* Giao diện cổng bắt đầu theo mẫu bạn gửi */
        #gate-container {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; transition: opacity 1.5s ease;
        }

        /* Vòng tròn năng lượng neon */
        .energy-orb {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #00f2ff 0%, rgba(0, 242, 255, 0.5) 40%, transparent 70%);
            border-radius: 50%; border: 2px solid #00f2ff;
            box-shadow: 0 0 50px #00f2ff, inset 0 0 30px #00f2ff;
            margin-bottom: 50px; animation: orbPulse 3s infinite ease-in-out;
        }

        @keyframes orbPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; filter: blur(2px); }
            50% { transform: scale(1.05); opacity: 1; filter: blur(0px); }
        }

        .main-title {
            font-family: 'Orbitron', sans-serif; font-size: 4rem; color: #fff;
            letter-spacing: 15px; text-transform: uppercase; margin: 0;
            text-shadow: 0 0 20px #00f2ff;
        }

        .input-group { margin-top: 40px; text-align: center; }

        .code-input {
            background: rgba(255,255,255,0.05); border: 1.5px solid #00f2ff;
            padding: 12px 30px; color: #fff; font-size: 1rem; border-radius: 25px;
            outline: none; width: 280px; text-align: center; letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif; margin-bottom: 25px;
        }

        .btn-launch {
            display: block; width: 220px; margin: 0 auto;
            padding: 15px; background: #fff; color: #000;
            border-radius: 30px; border: none; font-weight: 900;
            text-transform: uppercase; letter-spacing: 3px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255,255,255,0.4); transition: 0.4s;
        }

        .btn-launch:hover { transform: scale(1.1); box-shadow: 0 0 40px #00f2ff; background: #00f2ff; }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="universe"></canvas>

<div id="gate-container">
    <div class="energy-orb"></div>
    <h1 class="main-title">GALAXY 8-3</h1>
    
    <div class="input-group">
        <input type="password" id="pass" class="code-input" placeholder="MẬT MÃ KHÔNG GIAN">
        <button class="btn-launch" onclick="Universe.ignite()">Khởi Động</button>
    </div>
</div>

<script>
/**
 * PHẦN 1: CORE ENGINE & UNIVERSE INITIALIZATION
 */
const Universe = {
    canvas: document.getElementById('universe'),
    stars: [], speed: 0.8, targetSpeed: 0.8,

    init() {
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        this.createStars();
        this.render();
        window.onresize = () => this.resize();
    },

    resize() {
        this.w = this.canvas.width = window.innerWidth;
        this.h = this.canvas.height = window.innerHeight;
    },

    createStars() {
        // Khởi tạo 1500 ngôi sao có chiều sâu Z chuẩn cinematic
        for(let i=0; i<1500; i++) {
            this.stars.push({
                x: Math.random() * 4000 - 2000,
                y: Math.random() * 4000 - 2000,
                z: Math.random() * 4000,
                pz: 0
            });
        }
    },

    ignite() {
        const p = document.getElementById('pass').value;
        if(p !== "83") return alert("Mật mã không đúng!");
        
        document.getElementById('gate-container').classList.add('hidden');
        // Kích hoạt Warp Drive (Phần này sẽ xử lý ở Script tiếp theo)
        this.targetSpeed = 60;
    },

    render() {
        this.speed += (this.targetSpeed - this.speed) * 0.05;
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0, 0, this.w, this.h);

        this.stars.forEach(s => {
            s.pz = s.z;
            s.z -= this.speed;
            if(s.z < 1) { s.z = 4000; s.pz = s.z; }

            // Thuật toán chiếu 3D sang 2D
            let x = (s.x / s.z) * this.w + this.w/2;
            let y = (s.y / s.z) * this.h + this.h/2;
            let px = (s.x / s.pz) * this.w + this.w/2;
            let py = (s.y / s.pz) * this.h + this.h/2;

            this.ctx.strokeStyle = `rgba(255, 255, 255, ${Math.min(1, 1 - s.z/4000)})`;
            this.ctx.lineWidth = (1 - s.z/4000) * 3;
            this.ctx.beginPath();
            this.ctx.moveTo(px, py);
            this.ctx.lineTo(x, y);
            this.ctx.stroke();
        });

        requestAnimationFrame(() => this.render());
    }
};

Universe.init();
</script>
