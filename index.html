<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>8/3 - Our Classroom Universe</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: #000; color: white;
        }

        /* Lớp nền chính để hiển thị hình ảnh vũ trụ */
        #main-background {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            transition: background-image 2s ease-in-out;
            background-image: url('image_0.png'); /* Nền mặc định */
        }

        /* Lớp phủ mờ (vẫn cho phép nhìn thấy nền) */
        .overlay {
            position: fixed; inset: 0; z-index: 2;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
            transition: 1.5s ease;
        }

        /* GIAI ĐOẠN 1: CỔNG ĐỎ & MẬT KHẨU LỚP */
        #login-gate {
            background: radial-gradient(circle, #300 0%, transparent 100%);
        }

        .red-portal {
            width: 150px; height: 150px; border-radius: 50%;
            box-shadow: 0 0 60px #ff0000; border: 2px solid #ff3333;
            margin-bottom: 20px; animation: glow 2s infinite;
        }

        @keyframes glow { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }

        /* GIAI ĐOẠN 2: VŨ TRỤ NỞ RA & 30 NGÔI SAO */
        #universe {
            display: none; position: fixed; inset: 0; z-index: 3;
            opacity: 0; transition: opacity 2s ease;
        }

        /* Hiệu ứng nấp nháy cho các ngôi sao */
        @keyframes starTwinkle { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .star-entity {
            position: absolute; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer;
            border: 2px solid white;
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: starTwinkle 3s infinite;
        }

        .star-entity:hover { transform: scale(1.8) !important; z-index: 20; box-shadow: 0 0 40px #0ff; }

        /* GIAI ĐOẠN 3: VŨ TRỤ CÁ NHÂN */
        #personal-page {
            position: fixed; inset: 0; z-index: 50; display: none;
            backdrop-filter: blur(20px);
            justify-content: center; align-items: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15); padding: 40px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3); width: 85%; max-width: 500px;
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .big-avatar {
            width: 150px; height: 150px; border-radius: 50%;
            margin: 0 auto 20px; border: 5px solid white;
            box-shadow: 0 0 30px #ff75c3;
            background-size: cover; background-position: center;
        }

        .info-content { text-align: left; line-height: 1.6; }
        .info-content h2 { text-align: center; color: #ff75c3; margin-bottom: 5px; }
        .info-content p { font-style: italic; color: #eee; }

        input, button {
            background: rgba(255, 255, 255, 0.15); border: 1px solid white; padding: 12px;
            color: white; border-radius: 25px; text-align: center; outline: none;
            backdrop-filter: blur(5px); width: 200px; margin: 10px;
        }

        button { background: white; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.1); box-shadow: 0 0 20px white; }

    </style>
</head>
<body>

    <div id="main-background"></div>

    <div id="login-gate" class="overlay">
        <div class="red-portal"></div>
        <h2 style="letter-spacing: 2px;">VŨ TRỤ 8/3</h2>
        <input type="password" id="gatePass" placeholder="Mật khẩu của lớp...">
        <button onclick="unlockUniverse()">KHÁM PHÁ</button>
    </div>

    <div id="universe"></div>

    <div id="personal-page">
        <div class="glass-card" id="card-step-1">
            <div id="previewAvatar" class="big-avatar"></div>
            <h3 id="previewName">Tên Bạn Nữ</h3>
            <input type="password" id="girlPass" placeholder="Nhập mã riêng của bạn...">
            <br>
            <button onclick="accessHeart()">MỞ KHÓA</button>
            <button onclick="backToSpace()" style="background:none; color:white; border: none;">Quay lại</button>
        </div>

        <div class="glass-card" id="card-step-2" style="display:none">
            <div id="finalAvatar" class="big-avatar"></div>
            <div class="info-content">
                <h2 id="finalName">Tên</h2>
                <p style="text-align:center; margin-bottom: 20px;" id="finalDob">08/03/200X</p>
                <strong>💌 Cảm nhận:</strong>
                <p id="finalFeeling">...</p>
                <strong>🌸 Lời chúc từ hội con trai:</strong>
                <p id="finalWish">...</p>
            </div>
            <button onclick="backToSpace()" style="margin-top:20px">TRỞ LẠI VŨ TRỤ</button>
        </div>
    </div>

    <script>
        // DỮ LIỆU 30 BẠN NỮ
        const girlsData = Array.from({ length: 30 }, (_, i) => ({
            name: `Bạn Nữ ${i + 1}`,
            dob: "08/03/2008",
            // Bạn có thể dùng ảnh là khuôn mặt của bạn đó
            img: "https://via.placeholder.com/150", 
            pass: "123", // Mật khẩu riêng từng bạn
            feeling: "Một cô gái vô cùng đặc biệt và là mảnh ghép không thể thiếu của lớp mình!",
            wish: "Chúc bạn luôn tỏa sáng như ngôi sao đẹp nhất trong vũ trụ này. Happy Women's Day!"
        }));

        const GATE_PASSWORD = "83";
        let activeGirl = null;
        const mainBg = document.getElementById('main-background');

        // MỞ KHÓA VŨ TRỤ XANH (GIAI ĐOẠN 2)
        function unlockUniverse() {
            const passInput = document.getElementById('gatePass');
            if(passInput.value === GATE_PASSWORD) {
                // Chuyển sang ảnh nền 2
                mainBg.style.backgroundImage = "url('image_1.png')";
                
                // Màn 1 mờ dần và biến mất
                document.getElementById('login-gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-gate').style.display = 'none';
                    document.getElementById('universe').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('universe').style.opacity = '1';
                        spawnStars();
                    }, 100);
                }, 1000);
            } else { alert("Mã không gian chưa đúng!"); }
        }

        // TẠO 30 NGÔI SAO TRONG VŨ TRỤ XANH
        function spawnStars() {
            const container = document.getElementById('universe');
            girlsData.forEach((g, i) => {
                const star = document.createElement('div');
                star.className = 'star-entity';
                
                // Bạn có thể cho ảnh khuôn mặt vào ngôi sao, 
                // nhưng mình khuyên nên giữ cho ngôi sao lấp lánh như ảnh 2 
                // và chỉ hiện ảnh khi được nhấp vào (sang màn 3)
                // star.style.backgroundImage = `url(${g.img})`;
                star.style.backgroundColor = (i % 2 === 0) ? '#0ff' : '#f33'; // Xanh và đỏ xen kẽ như ảnh 2
                
                // Hiệu ứng "nở ra" từ tâm
                star.style.left = "50%";
                star.style.top = "50%";
                star.style.transform = "translate(-50%, -50%) scale(0)";

                container.appendChild(star);

                // Bay ra vị trí ngẫu nhiên
                setTimeout(() => {
                    star.style.left = (Math.random() * 80 + 10) + "%";
                    star.style.top = (Math.random() * 80 + 10) + "%";
                    star.style.transform = "scale(1)";
                }, i * 50 + 500);

                // Chuyển sang trang riêng khi được nhấp vào
                star.onclick = () => {
                    activeGirl = g;
                    document.getElementById('personal-page').style.display = 'flex';
                    document.getElementById('card-step-1').style.display = 'block';
                    document.getElementById('card-step-2').style.display = 'none';
                    document.getElementById('previewAvatar').style.backgroundImage = `url(${g.img})`;
                    document.getElementById('previewName').innerText = g.name;
                    document.getElementById('girlPass').value = "";
                };
            });
        }

        // MỞ KHÓA VŨ TRỤ CÁ NHÂN (GIAI ĐOẠN 3)
        function accessHeart() {
            const girlPassInput = document.getElementById('girlPass');
            if(girlPassInput.value === activeGirl.pass) {
                // Chuyển sang ảnh nền 3 (vũ trụ cá nhân)
                mainBg.style.backgroundImage = "url('image_2.png')";
                
                document.getElementById('card-step-1').style.display = 'none';
                document.getElementById('card-step-2').style.display = 'block';
                document.getElementById('finalAvatar').style.backgroundImage = `url(${activeGirl.img})`;
                document.getElementById('finalName').innerText = activeGirl.name;
                document.getElementById('finalDob').innerText = "Ngày sinh: " + activeGirl.dob;
                document.getElementById('finalFeeling').innerText = activeGirl.feeling;
                document.getElementById('finalWish').innerText = activeGirl.wish;
            } else { alert("Mật khẩu riêng chưa đúng!"); }
        }

        // QUAY LẠI VŨ TRỤ XANH
        function backToSpace() {
            // Quay lại ảnh nền 2 (vũ trụ chung)
            mainBg.style.backgroundImage = "url('image_1.png')";
            document.getElementById('personal-page').style.display = 'none';
        }

    </script>
</body>
</html>
