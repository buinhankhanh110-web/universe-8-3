<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vũ Trụ 8/3</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #000010, #000000);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

#universe {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.star {
    position: absolute;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: float 6s infinite ease-in-out alternate;
}

.star:hover {
    transform: scale(1.8);
    box-shadow: 0 0 20px white;
}

@keyframes float {
    from { transform: translateY(0px); }
    to { transform: translateY(-20px); }
}

#intro {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 24px;
    opacity: 1;
    transition: opacity 2s ease;
}
</style>
</head>
<body>

<div id="universe">
    <div id="intro">Một ngôi sao đang xuất hiện...</div>
</div>

<script>
const universe = document.getElementById("universe");
const intro = document.getElementById("intro");

function randomColor() {
    const colors = ["#ff4d4d","#ffcc00","#66ffcc","#66ccff","#ff66ff","#ffffff"];
    return colors[Math.floor(Math.random() * colors.length)];
}

function createStar(delay) {
    setTimeout(() => {
        const star = document.createElement("div");
        star.classList.add("star");
        star.style.left = Math.random() * 95 + "vw";
        star.style.top = Math.random() * 95 + "vh";
        star.style.background = randomColor();

        star.addEventListener("click", () => {
            alert("Ngôi sao này sẽ được mở khóa ở phiên bản sau ✨");
        });

        universe.appendChild(star);
    }, delay);
}

// Ban đầu hiện 1 sao
createStar(0);

// Sau 2 giây hiện 29 sao còn lại
setTimeout(() => {
    intro.style.opacity = 0;
    for (let i = 1; i < 30; i++) {
        createStar(i * 150);
    }
}, 2000);
</script>

</body>
</html>
