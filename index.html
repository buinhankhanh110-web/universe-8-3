<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>10A1 Cosmic - Backbone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        
        /* Giao diện Overlay ban đầu */
        #ui { 
            position: fixed; inset: 0; z-index: 10; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(0,40,80,0.4) 0%, rgba(0,0,0,1) 90%);
            transition: 1.5s ease-in-out;
        }
        .glow-title { 
            color: #fff; font-size: 4em; letter-spacing: 15px; 
            text-shadow: 0 0 20px #0ff, 0 0 30px #0ff; margin-bottom: 40px; 
        }
        .input-style {
            background: rgba(255,255,255,0.1); border: 2px solid #0ff; border-radius: 30px;
            color: #fff; padding: 12px 25px; width: 250px; text-align: center;
            font-size: 1.1em; outline: none; margin-bottom: 25px;
        }
        .btn-start {
            background: #00ffff; border: none; padding: 15px 50px; border-radius: 40px;
            color: #000; font-weight: bold; font-size: 1.1em; cursor: pointer;
            box-shadow: 0 0 25px #0ff; transition: 0.3s;
        }
        .btn-start:hover { transform: scale(1.1); box-shadow: 0 0 40px #fff; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.2); }
    </style>
</head>
<body>

<canvas id="universe"></canvas>

<div id="ui">
    <h1 class="glow-title">GALAXY 10A1</h1>
    <input type="password" id="pw" class="input-style" placeholder="MẬT MÃ 83">
    <button class="btn-start" onclick="Engine.launch()">KHỞI ĐỘNG VŨ TRỤ</button>
</div>

<script>
/**
 * COSMIC BACKBONE ENGINE
 * Tập trung vào hiệu ứng Hyper-space 3D chuẩn xác
 */
const Engine = {
    canvas: document.getElementById('universe'),
    stars: [],
    speed: 1,
    isWarping: false,

    init() {
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        // Khởi tạo 1500 ngôi sao nền
        for(let i = 0; i < 1500; i++) {
            this.stars.push({
                x: Math.random() * this.w - this.w / 2,
                y: Math.random() * this.h - this.h / 2,
                z: Math.random() * this.w,
                pz: 0
            });
        }
        window.onresize = () => this.resize();
        this.render();
    },

    resize() {
        this.w = this.canvas.width = window.innerWidth;
        this.h = this.canvas.height = window.innerHeight;
    },

    launch() {
        const p = document.getElementById('pw').value;
        if(p !== "83") return alert("Mật mã sai!");
        
        document.getElementById('ui').classList.add('hidden');
        this.isWarping = true;
        
        // Hiệu ứng tăng tốc Hyper-speed
        let accel = setInterval(() => {
            this.speed += 1.5;
            if(this.speed > 45) {
                clearInterval(accel);
                // Sau khi đạt tốc độ tối đa, giảm tốc về trạng thái ổn định
                setTimeout(() => this.slowDown(), 1500);
            }
        }, 50);
    },

    slowDown() {
        let decel = setInterval(() => {
            this.speed -= 1;
            if(this.speed <= 1) {
                clearInterval(decel);
                this.speed = 1;
                this.isWarping = false;
                console.log("Backbone ready for constellation layer.");
            }
        }, 80);
    },

    render() {
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0, 0, this.w, this.h);

        this.stars.forEach(s => {
            s.pz = s.z;
            s.z -= this.speed;

            // Nếu sao bay qua mặt người xem, reset lại về xa
            if(s.z < 1) {
                s.z = this.w;
                s.pz = s.z;
            }

            // Thuật toán chiếu 3D chuẩn (image_457c3c.png)
            let sx = (s.x / s.z) * this.w + this.w / 2;
            let sy = (s.y / s.z) * this.h + this.h / 2;
            let px = (s.x / s.pz) * this.w + this.w / 2;
            let py = (s.y / s.pz) * this.h + this.h / 2;

            this.ctx.strokeStyle = `rgba(255, 255, 255, ${1 - s.z/this.w})`;
            this.ctx.lineWidth = (1 - s.z/this.w) * 3;
            this.ctx.beginPath();
            this.ctx.moveTo(px, py);
            this.ctx.lineTo(sx, sy);
            this.ctx.stroke();
        });

        requestAnimationFrame(() => this.render());
    }
};

Engine.init();
</script>
</body>
</html>
