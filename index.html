<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>10A1 Universe - Backbone</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; }
        .layer { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            flex-direction: column; z-index: 10; background: rgba(0,0,0,0.8);
        }
        .hidden { display: none !important; }
        input, button { padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #fff; }
        button { cursor: pointer; background: #fff; color: #000; font-weight: bold; }
        
        /* Popup thông báo trung tâm */
        #star-portal-box { 
            background: #111; border: 2px solid #fff; padding: 30px; 
            text-align: center; max-width: 400px;
        }
        #girl-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="scene-login" class="layer">
    <h1>10A1 PORTAL</h1>
    <input type="password" id="pass" placeholder="Mật khẩu lớp (10A1)...">
    <button onclick="runLogin()">KÍCH HOẠT</button>
</div>

<div id="star-portal" class="layer hidden">
    <div id="star-portal-box">
        <img id="girl-img" src="">
        <h2 id="girl-name-display"></h2>
        
        <div id="lock-section">
            <div style="font-size: 40px; margin: 10px;">🔒</div>
            <input type="password" id="private-pass" placeholder="Nhập pass riêng (123)...">
            <button onclick="checkPrivatePass()">MỞ KHÓA</button>
        </div>

        <div id="private-content" class="hidden">
            <div id="canva-frame" style="width: 300px; height: 400px; background: #333; display:flex; align-items:center; justify-content:center;">
                <p>ẢNH CANVA CỦA BẠN</p>
            </div>
            <button onclick="closeStarPortal()">XONG</button>
        </div>
    </div>
</div>

<div id="scene-teacher" class="layer hidden" style="background: #fff; color: #000;">
    <h1>GỬI CÔ GIÁO</h1>
    <p>Cảm ơn cô đã luôn là ngôi sao dẫn đường cho 10A1</p>
</div>

<script>
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');
let w, h, stars = [], currentScene = 'IDLE';
let speed = 0.5, viewed = 0, isCollapsing = false;

// Dữ liệu 30 bạn
const girls = Array.from({length: 30}, (_, i) => ({
    name: `Bạn nữ ${i+1}`,
    pass: "123",
    img: "https://via.placeholder.com/150", 
    active: true, x: 0, y: 0
}));

function init() {
    w = cvs.width = window.innerWidth;
    h = cvs.height = window.innerHeight;
    stars = Array.from({length: 300}, () => ({
        x: Math.random()*w - w/2, y: Math.random()*h - h/2, z: Math.random()*w
    }));
    setupConstellation();
}

function setupConstellation() {
    girls.forEach((g, i) => {
        // Tọa độ thô để xếp thành chữ 10A1
        if (i < 8) { // Số 1
            g.x = -250; g.y = i * 40 - 150;
        } else if (i < 20) { // Số 0
            let angle = (i - 8) * (Math.PI * 2 / 12);
            g.x = -100 + 60 * Math.cos(angle);
            g.y = 80 * Math.sin(angle);
        } else if (i < 26) { // Chữ A
            g.x = 50 + (i-20)*20; g.y = 100 - (i-20)*40;
            if(i>23) { g.x = 50 + (i-23)*20; g.y = -20 + (i-23)*40; }
        } else { // Số 1 cuối
            g.x = 200; g.y = (i-26) * 40 - 150;
        }
    });
}

function draw() {
    ctx.fillStyle = (currentScene === 'WARP') ? 'rgba(0,0,0,0.2)' : '#000';
    ctx.fillRect(0, 0, w, h);
    ctx.save();
    ctx.translate(w/2, h/2);

    if (currentScene === 'CONSTELLATION') drawLines();

    stars.forEach((s, i) => {
        s.z -= speed;
        if(s.z <= 0) s.z = w;
        let x = s.x * (w/s.z);
        let y = s.y * (h/s.z);

        if(currentScene === 'CONSTELLATION' && i < 30) {
            let g = girls[i];
            if(isCollapsing) { g.x *= 0.9; g.y *= 0.9; if(Math.abs(g.x)<1) currentScene = 'SUPERNOVA'; }
            
            s.x += (g.x - s.x) * 0.1;
            s.y += (g.y - s.y) * 0.1;
            s.z = 1000;
            if(g.active) drawStar(s.x, s.y, 5, '#fff');
        } else {
            drawStar(x, y, 2, '#666');
        }
    });

    if(currentScene === 'SUPERNOVA') drawSupernova();

    ctx.restore();
    requestAnimationFrame(draw);
}

function drawStar(x, y, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
}

function drawLines() {
    ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    girls.forEach((g, i) => {
        if(i > 0 && g.active && girls[i-1].active) {
            ctx.moveTo(girls[i-1].x, girls[i-1].y);
            ctx.lineTo(g.x, g.y);
        }
    });
    ctx.stroke();
}

// LOGIC ĐIỀU KHIỂN
function runLogin() {
    if(document.getElementById('pass').value === '10A1') {
        document.getElementById('scene-login').classList.add('hidden');
        currentScene = 'WARP';
        speed = 50; 
        setTimeout(() => { currentScene = 'CONSTELLATION'; speed = 0.5; }, 3000);
    }
}

cvs.addEventListener('click', (e) => {
    if(currentScene !== 'CONSTELLATION') return;
    girls.forEach(g => {
        let dx = e.clientX - w/2 - g.x;
        let dy = e.clientY - h/2 - g.y;
        if(Math.sqrt(dx*dx + dy*dy) < 20 && g.active) {
            window.cur = g;
            showPortal(g);
        }
    });
});

function showPortal(g) {
    document.getElementById('star-portal').classList.remove('hidden');
    document.getElementById('girl-name-display').innerText = g.name;
    document.getElementById('girl-img').src = g.img;
    document.getElementById('lock-section').classList.remove('hidden');
    document.getElementById('private-content').classList.add('hidden');
    document.getElementById('private-pass').value = "";
}

function checkPrivatePass() {
    if(document.getElementById('private-pass').value === window.cur.pass) {
        document.getElementById('lock-section').classList.add('hidden');
        document.getElementById('private-content').classList.remove('hidden');
    } else { alert("Sai pass!"); }
}

function closeStarPortal() {
    document.getElementById('star-portal').classList.add('hidden');
    window.cur.active = false;
    viewed++;
    if(viewed >= 30) {
        girls.forEach(g => g.active = true);
        setTimeout(() => { isCollapsing = true; }, 1000);
    }
}

let snSize = 0;
function drawSupernova() {
    snSize += 30;
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(0, 0, snSize, 0, Math.PI*2); ctx.fill();
    if(snSize > w) document.getElementById('scene-teacher').classList.remove('hidden');
}

window.onresize = init;
init(); draw();
</script>
</body>
</html>
