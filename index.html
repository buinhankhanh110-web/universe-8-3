<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vũ Trụ Lớp Chúng Ta</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

/* canvas nền */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

/* sao */

.star{
position:absolute;
border-radius:50%;
cursor:pointer;
transition:transform .3s;
}

.star:hover{
transform:scale(1.4);
}

/* glow */

.star::before{
content:"";
position:absolute;
width:100%;
height:100%;
border-radius:50%;

background:radial-gradient(
circle,
white 0%,
#8ee6ff 40%,
rgba(142,230,255,0.4) 65%,
transparent 85%
);

animation:pulse 2.5s infinite;
}

.star::after{
content:"";
position:absolute;
width:250%;
height:250%;
top:-75%;
left:-75%;

border-radius:50%;

background:radial-gradient(
circle,
rgba(142,230,255,0.5),
transparent 70%
);

filter:blur(35px);
}

/* tên hiện khi hover */

.label{

position:absolute;
color:white;
font-size:14px;
pointer-events:none;
opacity:0;
transition:.3s;
white-space:nowrap;

text-shadow:0 0 10px #8ee6ff;

}

.star:hover + .label{
opacity:1;
}

/* pulse */

@keyframes pulse{

0%{transform:scale(.9);opacity:.7;}
50%{transform:scale(1.1);opacity:1;}
100%{transform:scale(.9);opacity:.7;}

}

/* sao băng */

.shootingStar{

position:absolute;
width:2px;
height:2px;
background:white;

box-shadow:0 0 10px white;

animation:shoot 2s linear forwards;

}

@keyframes shoot{

0%{
transform:translate(0,0);
opacity:1;
}

100%{
transform:translate(-600px,300px);
opacity:0;
}

}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<script>

/* ===== NỀN VŨ TRỤ ===== */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let starsBg=[]

for(let i=0;i<300;i++){

starsBg.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5

})

}

function drawBackground(){

ctx.fillStyle="#020412"
ctx.fillRect(0,0,canvas.width,canvas.height)

/* tinh vân */

let nebula=ctx.createRadialGradient(

canvas.width*0.7,
canvas.height*0.3,
50,

canvas.width*0.7,
canvas.height*0.3,
800

)

nebula.addColorStop(0,"rgba(120,180,255,0.6)")
nebula.addColorStop(.3,"rgba(90,160,255,0.3)")
nebula.addColorStop(.6,"rgba(60,120,255,0.15)")
nebula.addColorStop(1,"transparent")

ctx.fillStyle=nebula
ctx.fillRect(0,0,canvas.width,canvas.height)

/* sao nền */

starsBg.forEach(s=>{

ctx.beginPath()

ctx.arc(s.x,s.y,s.r,0,Math.PI*2)

ctx.fillStyle="white"

ctx.shadowColor="#8ee6ff"
ctx.shadowBlur=8

ctx.fill()

})

ctx.shadowBlur=0

requestAnimationFrame(drawBackground)

}

drawBackground()

/* ===== DANH SÁCH BẠN ===== */

let classmates=[

"An","Bình","Chi","Duy","Hà",
"Hân","Hoa","Hương","Lan","Linh",
"Mai","Minh","My","Ngân","Ngọc",
"Phương","Quỳnh","Trang","Trâm","Vy",
"Yến","Ánh","Bảo","Cúc","Đào",
"Giang","Huyền","Khánh","Liên","Nhi"

]

let orbitStars=[]

/* ===== TẠO SAO ===== */

classmates.forEach(name=>{

let star=document.createElement("div")
star.className="star"

let size=25+Math.random()*20

star.style.width=size+"px"
star.style.height=size+"px"

/* vị trí */

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

star.style.left=x+"px"
star.style.top=y+"px"

/* label */

let label=document.createElement("div")
label.className="label"
label.innerText=name

label.style.left=(x+10)+"px"
label.style.top=(y+10)+"px"

document.body.appendChild(star)
document.body.appendChild(label)

/* zoom khi click */

star.onclick=()=>{

document.body.style.transformOrigin=x+"px "+y+"px"
document.body.style.transform="scale(1.3)"

setTimeout(()=>{

document.body.style.transform="scale(1)"

},1200)

}

/* orbit */

orbitStars.push({

element:star,
label:label,
baseX:x,
baseY:y,
angle:Math.random()*Math.PI*2,
speed:0.01+Math.random()*0.01,
radius:10+Math.random()*20

})

})

/* ===== ORBIT ===== */

function animateOrbit(){

orbitStars.forEach(s=>{

s.angle+=s.speed

let x=s.baseX+Math.cos(s.angle)*s.radius
let y=s.baseY+Math.sin(s.angle)*s.radius

s.element.style.left=x+"px"
s.element.style.top=y+"px"

s.label.style.left=(x+10)+"px"
s.label.style.top=(y+10)+"px"

})

requestAnimationFrame(animateOrbit)

}

animateOrbit()

/* ===== SAO BĂNG ===== */

function shootingStar(){

let star=document.createElement("div")

star.className="shootingStar"

star.style.left=Math.random()*window.innerWidth+"px"
star.style.top=Math.random()*200+"px"

document.body.appendChild(star)

setTimeout(()=>{

star.remove()

},2000)

}

setInterval(shootingStar,4000)

</script>

</body>
</html>
