<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10A1 Universe - Project 8.3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="universe"></canvas>

    <div id="scene-login" class="ui-container">
        <div class="glass-card">
            <h1>10A1 PORTAL</h1>
            <p style="opacity: 0.6; font-size: 0.8rem; margin-bottom: 20px;">HÀNH TRÌNH KHÁM PHÁ VŨ TRỤ 10A1</p>
            <input type="password" id="main-pass" placeholder="MẬT KHẨU LỚP">
            <button onclick="startJourney()">KÍCH HOẠT</button>
        </div>
    </div>

    <div id="scene-unlock" class="ui-container hidden">
        <div class="glass-card">
            <img id="girl-img" src="" alt="Avatar">
            <h2 id="girl-name"></h2>
            
            <div id="lock-section">
                <div class="lock-icon">🔒</div>
                <input type="password" id="girl-pass" placeholder="Mã bí mật riêng">
                <button onclick="unlockGirl()">MỞ KHÓA</button>
                <p class="close-txt" onclick="closePortal()">[ THOÁT ]</p>
            </div>

            <div id="private-view" class="hidden">
                <div class="canva-container">
                    <img id="canva-img" src="" alt="Canva Design">
                </div>
                <button onclick="closePortal()" style="background: white; color: black;">HOÀN TẤT</button>
            </div>
        </div>
    </div>

    <div id="scene-teacher" class="ui-container hidden teacher-theme">
        <div class="teacher-content">
            <h1 style="color: #000; letter-spacing: 5px;">GỬI CÔ GIÁO</h1>
            <p style="font-size: 1.2rem; max-width: 600px;">"Cô là ngôi sao dẫn đường cho tập thể 10A1 tỏa sáng."</p>
            <p style="font-weight: bold; margin-top: 30px;">CHÚC CÔ 8/3 HẠNH PHÚC & RẠNG RỠ!</p>
            <button onclick="location.reload()" style="background: black; color: white;">QUAY LẠI VŨ TRỤ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
