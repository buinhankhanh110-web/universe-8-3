<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Galaxy 10A1</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

/* EVENT HORIZON UI */

#gateway{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:5;
}

input{
padding:10px;
font-size:18px;
border:none;
outline:none;
border-radius:6px;
}

button{
padding:10px 20px;
font-size:18px;
margin-left:10px;
cursor:pointer;
border:none;
border-radius:6px;
background:cyan;
}

/* MODAL */

#modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:10;
}

#modalContent{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);
padding:40px;
border-radius:20px;
max-width:400px;
text-align:center;
}

/* FINALE MESSAGE */

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:32px;
text-align:center;
width:70%;
}

</style>
</head>

<body>

<div id="gateway">
<h2>ENTER CODE</h2>
<input id="code">
<button onclick="engage()">ENGAGE</button>
</div>

<div id="modal">
<div id="modalContent">
<p id="wish"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<div id="message"></div>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = innerWidth
canvas.height = innerHeight

let currentPhase = "GATEWAY"

let stars=[]
let explorationStars=[]
let particles=[]

let warpSpeed=0
let warpTime=0

let countdown=30
let modalStar=null

let bigBangTriggered=false
let typeLock=false

/* STAR CLASS */

class Star{
constructor(x,y){
this.x=x
this.y=y
this.size=Math.random()*2
this.vx=(Math.random()-0.5)*0.2
this.vy=(Math.random()-0.5)*0.2
}
draw(){
ctx.fillStyle="white"
ctx.fillRect(this.x,this.y,this.size,this.size)
}
update(){
this.x+=this.vx
this.y+=this.vy
}
}

/* PARTICLE */

class Particle{
constructor(x,y){
this.x=x
this.y=y
this.vx=(Math.random()-0.5)*10
this.vy=(Math.random()-0.5)*10
this.life=1
}
update(){
this.vx*=0.96
this.vy*=0.96
this.x+=this.vx
this.y+=this.vy
this.life-=0.01
}
draw(){
ctx.globalAlpha=this.life
ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`
ctx.fillRect(this.x,this.y,2,2)
ctx.globalAlpha=1
}
}

/* CREATE BACKGROUND STARS */

for(let i=0;i<400;i++){
stars.push(new Star(Math.random()*canvas.width,Math.random()*canvas.height))
}

/* ENGAGE */

function engage(){
let code=document.getElementById("code").value
if(code==="83"){
document.getElementById("gateway").style.display="none"
currentPhase="SUCTION"
}
}

/* MODAL */

function openModal(star){
modalStar=star
document.getElementById("wish").innerText=
"Chúc cô luôn mạnh khỏe, hạnh phúc và tiếp tục truyền cảm hứng cho chúng em."
document.getElementById("modal").style.display="flex"
}

function closeModal(){

document.getElementById("modal").style.display="none"

for(let i=0;i<20;i++){
particles.push(new Particle(modalStar.x,modalStar.y))
}

explorationStars=explorationStars.filter(s=>s!==modalStar)

countdown--

if(countdown<=0){
currentPhase="VORTEX"
}

}

/* CREATE EXPLORATION STARS */

function createExploration(){

let cx=canvas.width/2
let cy=canvas.height/2
let r=250

for(let i=0;i<30;i++){

let angle=i*(Math.PI*2/30)

explorationStars.push({
x:cx+Math.cos(angle)*r,
y:cy+Math.sin(angle)*r,
size:6
})

}

}

/* TYPEWRITER */

function typeWriter(text){

if(typeLock) return
typeLock=true

let i=0
let msg=document.getElementById("message")

function type(){
if(i<text.length){
msg.innerHTML+=text[i]
i++
setTimeout(type,40)
}
}

type()
}

/* CLICK DETECT */

canvas.addEventListener("click",e=>{

if(currentPhase!=="EXPLORATION") return

let rect=canvas.getBoundingClientRect()
let x=e.clientX-rect.left
let y=e.clientY-rect.top

explorationStars.forEach(star=>{
let d=Math.hypot(x-star.x,y-star.y)
if(d<10){
openModal(star)
}
})

})

/* SCREEN SHAKE */

function screenShake(){

let shake=10
canvas.style.transform=`translate(${(Math.random()-0.5)*shake}px,
${(Math.random()-0.5)*shake}px)`

setTimeout(()=>canvas.style.transform="translate(0,0)",100)

}

/* MAIN LOOP */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

switch(currentPhase){

case "GATEWAY":

stars.forEach(s=>{
s.update()
s.draw()
})

ctx.beginPath()
ctx.strokeStyle="cyan"
ctx.arc(canvas.width/2,canvas.height/2,80,0,Math.PI*2)
ctx.stroke()

break


case "SUCTION":

stars.forEach(s=>{

s.x+=(canvas.width/2-s.x)*0.02
s.y+=(canvas.height/2-s.y)*0.02

s.draw()

})

warpTime++

if(warpTime>80){
currentPhase="WARP"
}

break


case "WARP":

warpSpeed+=0.05

stars.forEach(s=>{

let dx=s.x-canvas.width/2
let dy=s.y-canvas.height/2

s.x+=dx*0.05*warpSpeed
s.y+=dy*0.05*warpSpeed

ctx.strokeStyle="white"
ctx.beginPath()
ctx.moveTo(s.x,s.y)
ctx.lineTo(s.x-dx*0.02,s.y-dy*0.02)
ctx.stroke()

})

warpTime++

if(warpTime>200){

createExploration()
currentPhase="EXPLORATION"

}

break


case "EXPLORATION":

explorationStars.forEach(star=>{

let g=ctx.createRadialGradient(
star.x,star.y,0,
star.x,star.y,20)

g.addColorStop(0,"white")
g.addColorStop(0.4,"cyan")
g.addColorStop(1,"transparent")

ctx.fillStyle=g
ctx.beginPath()
ctx.arc(star.x,star.y,20,0,Math.PI*2)
ctx.fill()

})

particles.forEach(p=>{
p.update()
p.draw()
})

particles=particles.filter(p=>p.life>0)

break


case "VORTEX":

let cx=canvas.width/2
let cy=canvas.height/2

explorationStars.forEach(star=>{

star.x+=(cx-star.x)*0.05
star.y+=(cy-star.y)*0.05

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(star.x,star.y,3,0,Math.PI*2)
ctx.fill()

})

if(Math.hypot(explorationStars[0].x-cx,explorationStars[0].y-cy)<5){

currentPhase="BIGBANG"

}

break


case "BIGBANG":

if(!bigBangTriggered){

for(let i=0;i<1000;i++){
particles.push(new Particle(canvas.width/2,canvas.height/2))
}

screenShake()

document.body.style.background=
"linear-gradient(135deg,#ff6ec4,#7873f5)"

typeWriter("Chúng em cảm ơn cô vì đã thắp sáng tri thức và truyền cảm hứng cho chúng em.")

bigBangTriggered=true

}

particles.forEach(p=>{
p.update()
p.draw()
})

particles=particles.filter(p=>p.life>0)

break

}

requestAnimationFrame(animate)

}

animate()

</script>
</body>
</html>
