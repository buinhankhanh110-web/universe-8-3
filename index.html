<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe 10A1 - 8/3 Special Project</title>
    <style>
        :root { --glow: #ff0080; --neon: #00d4ff; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Giao diện lớp phủ */
        .ui-container { position: absolute; z-index: 10; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { opacity: 0; pointer-events: none !important; transform: scale(1.1); }

        /* Thiết kế Card Thủy tinh (Glassmorphism) */
        .glass-card { 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px;
            padding: 50px; text-align: center; width: 380px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
        }

        h1 { font-weight: 200; letter-spacing: 12px; margin-bottom: 35px; font-size: 1.4rem; text-transform: uppercase; color: var(--neon); }
        
        input { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px; border-radius: 12px; color: white; width: 85%; outline: none;
            text-align: center; font-size: 1.1rem; transition: 0.4s; margin-bottom: 10px;
        }
        input:focus { border-color: var(--glow); box-shadow: 0 0 20px rgba(255, 0, 128, 0.3); }
        
        button {
            margin-top: 20px; padding: 15px 45px; border-radius: 12px; border: none;
            background: linear-gradient(45deg, var(--neon), var(--glow));
            color: white; font-weight: bold; cursor: pointer; letter-spacing: 3px;
            transition: 0.4s; text-transform: uppercase;
        }
        button:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255, 0, 128, 0.5); }

        /* Profile & Canva View */
        #girl-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--neon); margin-bottom: 20px; object-fit: cover; }
        .private-view { width: 100%; height: 500px; border-radius: 15px; overflow: hidden; margin-top: 20px; background: #000; display: none; border: 1px solid var(--glow); }
        .private-view img { width: 100%; height: 100%; object-fit: contain; }
        .close-btn { font-size: 0.8rem; color: #666; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<canvas id="universe"></canvas>

<div id="scene-login" class="ui-container">
    <div class="glass-card">
        <h1>10A1 PORTAL</h1>
        <input type="password" id="main-pass" placeholder="MẬT KHẨU LỚP">
        <button onclick="startJourney()">Kích hoạt</button>
    </div>
</div>

<div id="scene-unlock" class="ui-container hidden">
    <div class="glass-card" id="portal-box">
        <img id="girl-img" src="">
        <h2 id="girl-name" style="margin: 0; font-weight: 300; letter-spacing: 2px;"></h2>
        
        <div id="lock-section">
            <div id="lock-icon" style="font-size: 50px; margin: 20px 0;">🔒</div>
            <input type="password" id="girl-pass" placeholder="Mã bí mật riêng">
            <button onclick="unlockGirl()">Mở khóa</button>
            <div class="close-btn" onclick="closePortal()">[ Thoát ]</div>
        </div>

        <div id="private-view" class="private-view">
            <img id="canva-img" src="">
            <button onclick="closePortal()" style="margin: 20px 0;">Xong</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('universe');
    const ctx = canvas.getContext('2d');
    let w, h, stars = [], particles = [], nebulaClouds = [];
    let currentScene = 'IDLE';
    let speed = 0.2, shake = 0, overlayOpacity = 0;

    // DATA 30 BẠN NỮ (Khánh hãy thay pass và link ảnh thật vào đây)
    const girls = Array.from({length: 30}, (_, i) => ({
        id: i,
        name: `Bạn Nữ ${i + 1}`,
        pass: "123", 
        img: "https://via.placeholder.com/150", 
        canva: "https://via.placeholder.com/300x500", 
        unlocked: false, 
        x: 0, y: 0, group: ""
    }));

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        stars = Array.from({length: 600}, () => ({
            x: Math.random()*w - w/2, y: Math.random()*h - h/2, z: Math.random()*w,
            hue: 200 + Math.random()*40
        }));
        
        // Tạo hiệu ứng Tinh vân (Nebula) rực rỡ
        nebulaClouds = Array.from({length: 8}, () => ({
            x: Math.random()*w, y: Math.random()*h, r: 400 + Math.random()*500,
            color: Math.random() > 0.5 ? 'rgba(255, 0, 128, 0.04)' : 'rgba(0, 212, 255, 0.04)'
        }));
        map10A1();
    }

    // Xếp chữ 10A1 (Sơ đồ tọa độ chi tiết)
    function map10A1() {
        girls.forEach((g, i) => {
            if(i < 8) { g.x = -300; g.y = i*45-160; g.group="1"; }
            else if(i < 20) { 
                let a = (i-8)*(Math.PI*2/12);
                g.x = -100 + 80*Math.cos(a); g.y = 110*Math.sin(a); g.group="0";
            }
            else if(i < 26) { 
                g.x = 80 + (i-20)*25; g.y = 120 - (i-20)*50;
                if(i>22) { g.x = 80 + (i-22)*30; g.y = -30 + (i-22)*55; }
                g.group="A";
            }
            else { g.x = 260; g.y = (i-26)*70-140; g.group="1_2"; }
        });
    }

    function draw() {
        ctx.fillStyle = (currentScene === 'WARP') ? 'rgba(0, 0, 0, 0.2)' : '#000';
        ctx.fillRect(0, 0, w, h);

        // Vẽ Nebula
        nebulaClouds.forEach(c => {
            let grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
            grad.addColorStop(0, c.color);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
        });

        ctx.save();
        if(shake > 0) {
            ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);
            shake *= 0.92;
        }
        ctx.translate(w/2, h/2);

        stars.forEach((s, i) => {
            s.z -= speed;
            if(s.z <= 0) s.z = w;
            let x = s.x * (w/s.z);
            let y = s.y * (h/s.z);

            if(currentScene === 'CONSTELLATION' && i < 30) {
                let g = girls[i];
                if(currentScene === 'VORTEX') {
                    let angle = 0.12;
                    let oldX = g.x;
                    g.x = (g.x * Math.cos(angle) - g.y * Math.sin(angle)) * 0.95;
                    g.y = (oldX * Math.sin(angle) + g.y * Math.cos(angle)) * 0.95;
                    shake = 25;
                    if(Math.abs(g.x) < 2) currentScene = 'SUPERNOVA';
                }
                s.x += (g.x - s.x) * 0.08; s.y += (g.y - s.y) * 0.08; s.z = 1000;
                
                // Ngôi sao phát sáng lung linh
                ctx.shadowBlur = g.unlocked ? 30 : 10;
                ctx.shadowColor = g.unlocked ? "#ff0080" : "#00d4ff";
                ctx.fillStyle = g.unlocked ? "#ff0080" : "#fff";
                ctx.beginPath(); ctx.arc(s.x, s.y, 5, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            } else {
                ctx.fillStyle = `hsla(${s.hue}, 80%, 90%, ${1 - s.z/w})`;
                ctx.beginPath(); ctx.arc(x, y, (currentScene==='WARP'?3:1), 0, Math.PI*2); ctx.fill();
            }
        });

        // Hạt nổ Particle khi mở khóa thành công
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            ctx.fillStyle = `rgba(255, 0, 128, ${p.life})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
            if(p.life <= 0) particles.splice(i, 1);
        });

        if(currentScene === 'CONSTELLATION') drawConstellationLines();
        ctx.restore();

        if(currentScene === 'SUPERNOVA') {
            overlayOpacity += 0.012;
            ctx.fillStyle = `rgba(255, 255, 255, ${overlayOpacity})`;
            ctx.fillRect(0, 0, w, h);
            if(overlayOpacity >= 1) location.reload(); // Sau đó hiện trang của cô
        }

        requestAnimationFrame(draw);
    }

    function drawConstellationLines() {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        girls.forEach((g, i) => {
            if(i > 0 && g.group === girls[i-1].group) {
                ctx.moveTo(girls[i-1].x, girls[i-1].y);
                ctx.lineTo(g.x, g.y);
            }
        });
        ctx.stroke();
    }

    function startJourney() {
        if(document.getElementById('main-pass').value.toUpperCase() === '10A1') {
            document.getElementById('scene-login').classList.add('hidden');
            setTimeout(() => {
                currentScene = 'WARP'; speed = 65;
                setTimeout(() => { currentScene = 'CONSTELLATION'; speed = 0.2; }, 3000);
            }, 1000);
        }
    }

    canvas.addEventListener('click', (e) => {
        if(currentScene !== 'CONSTELLATION') return;
        girls.forEach(g => {
            let dx = e.clientX - w/2 - g.x, dy = e.clientY - h/2 - g.y;
            if(Math.sqrt(dx*dx + dy*dy) < 40) {
                window.selectedGirl = g;
                openPortal(g);
            }
        });
    });

    function openPortal(g) {
        document.getElementById('scene-unlock').classList.remove('hidden');
        document.getElementById('girl-name').innerText = g.name;
        document.getElementById('girl-img').src = g.img;
        document.getElementById('girl-pass').value = "";
        if(g.unlocked) { showPrivateContent(g); } 
        else {
            document.getElementById('lock-section').style.display = 'block';
            document.getElementById('private-view').style.display = 'none';
        }
    }

    function unlockGirl() {
        if(document.getElementById('girl-pass').value === window.selectedGirl.pass) {
            window.selectedGirl.unlocked = true;
            // Kích hoạt Particle nổ tung lấp lánh
            for(let i=0; i<40; i++) {
                particles.push({
                    x: window.selectedGirl.x, y: window.selectedGirl.y,
                    vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1
                });
            }
            showPrivateContent(window.selectedGirl);
        } else { alert("Mã bí mật không đúng rồi!"); }
    }

    function showPrivateContent(g) {
        document.getElementById('lock-section').style.display = 'none';
        document.getElementById('private-view').style.display = 'block';
        document.getElementById('canva-img').src = g.canva;
    }

    function closePortal() {
        document.getElementById('scene-unlock').classList.add('hidden');
        if(girls.filter(g => g.unlocked).length >= 30) {
            setTimeout(() => { currentScene = 'VORTEX'; shake = 40; }, 1200);
        }
    }

    window.onresize = init;
    init(); draw();
</script>
</body>
</html>
