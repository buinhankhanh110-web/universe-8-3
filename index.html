<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Galaxy 10A1</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

/* GATEWAY */

#gateway{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:5;
}

input{
padding:10px;
font-size:18px;
border:none;
border-radius:6px;
}

button{
padding:10px 18px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:6px;
background:cyan;
margin-left:10px;
}

/* MODAL */

#modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:10;
}

#modalContent{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
padding:40px;
border-radius:20px;
max-width:420px;
text-align:center;
}

/* MESSAGE */

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:32px;
text-align:center;
width:70%;
}

</style>
</head>

<body>

<div id="gateway">
<h2>GALAXY 10A1</h2>
<input id="code" placeholder="Enter Code">
<button onclick="engage()">ENGAGE</button>
</div>

<div id="modal">
<div id="modalContent">
<p id="wish"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<div id="message"></div>

<canvas id="c"></canvas>

<script>

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let currentPhase="GATEWAY"

let stars=[]
let explorationStars=[]
let particles=[]

let warpSpeed=0
let warpTimer=0
let vortexAngle=0

let modalStar=null
let countdown=30

let bigBangTriggered=false
let typeLock=false

/* STARFIELD */

class Star{

constructor(){
this.reset()
}

reset(){
this.x=Math.random()*canvas.width
this.y=Math.random()*canvas.height
this.z=Math.random()*2
this.size=this.z*1.5
this.twinkle=Math.random()*0.5
}

update(){
this.twinkle+=0.05
}

draw(){

ctx.globalAlpha=0.5+Math.sin(this.twinkle)*0.5
ctx.fillStyle="white"
ctx.fillRect(this.x,this.y,this.size,this.size)
ctx.globalAlpha=1

}

}

/* PARTICLE */

class Particle{

constructor(x,y){

this.x=x
this.y=y

this.vx=(Math.random()-0.5)*12
this.vy=(Math.random()-0.5)*12

this.life=1
this.size=2+Math.random()*2

}

update(){

this.vx*=0.96
this.vy*=0.96

this.x+=this.vx
this.y+=this.vy

this.life-=0.01

}

draw(){

ctx.globalAlpha=this.life
ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`
ctx.fillRect(this.x,this.y,this.size,this.size)
ctx.globalAlpha=1

}

}

/* CREATE STARS */

for(let i=0;i<600;i++) stars.push(new Star())

/* ENGAGE */

function engage(){

if(document.getElementById("code").value==="83"){

document.getElementById("gateway").style.display="none"
currentPhase="SUCTION"

}

}

/* EXPLORATION STARS */

function createExploration(){

let cx=canvas.width/2
let cy=canvas.height/2
let radius=260

for(let i=0;i<30;i++){

let angle=i*(Math.PI*2/30)

explorationStars.push({
angle:angle,
radius:radius,
x:cx+Math.cos(angle)*radius,
y:cy+Math.sin(angle)*radius
})

}

}

/* MODAL */

function openModal(star){

modalStar=star

document.getElementById("wish").innerText=
"Cảm ơn cô vì đã luôn kiên nhẫn, tận tâm và truyền cảm hứng cho chúng em trên hành trình tri thức."

document.getElementById("modal").style.display="flex"

}

function closeModal(){

document.getElementById("modal").style.display="none"

/* MINI BURST */

for(let i=0;i<40;i++){

particles.push(new Particle(modalStar.x,modalStar.y))

}

explorationStars=explorationStars.filter(s=>s!==modalStar)

countdown--

if(countdown<=0) currentPhase="VORTEX"

}

/* CLICK */

canvas.addEventListener("click",e=>{

if(currentPhase!=="EXPLORATION") return

let rect=canvas.getBoundingClientRect()
let x=e.clientX-rect.left
let y=e.clientY-rect.top

explorationStars.forEach(star=>{

let d=Math.hypot(x-star.x,y-star.y)

if(d<15) openModal(star)

})

})

/* TYPEWRITER */

function typeWriter(text){

if(typeLock) return
typeLock=true

let i=0
let msg=document.getElementById("message")

function type(){

if(i<text.length){

msg.innerHTML+=text[i]
i++
setTimeout(type,45)

}

}

type()

}

/* SCREEN SHAKE */

function screenShake(){

let intensity=12

let shake=setInterval(()=>{

canvas.style.transform=
`translate(${(Math.random()-0.5)*intensity}px,
${(Math.random()-0.5)*intensity}px)`

},30)

setTimeout(()=>{

clearInterval(shake)
canvas.style.transform="translate(0,0)"

},500)

}

/* MAIN LOOP */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

switch(currentPhase){

/* GATEWAY */

case "GATEWAY":

stars.forEach(s=>{
s.update()
s.draw()
})

ctx.strokeStyle="cyan"
ctx.lineWidth=3
ctx.beginPath()
ctx.arc(canvas.width/2,canvas.height/2,80,0,Math.PI*2)
ctx.stroke()

break

/* SUCTION */

case "SUCTION":

stars.forEach(s=>{

s.x+=(canvas.width/2-s.x)*0.02
s.y+=(canvas.height/2-s.y)*0.02

s.draw()

})

warpTimer++

if(warpTimer>90){
currentPhase="WARP"
}

break

/* WARP DRIVE */

case "WARP":

warpSpeed+=0.05

stars.forEach(s=>{

let dx=s.x-canvas.width/2
let dy=s.y-canvas.height/2

s.x+=dx*0.06*warpSpeed
s.y+=dy*0.06*warpSpeed

ctx.strokeStyle="white"
ctx.beginPath()
ctx.moveTo(s.x,s.y)
ctx.lineTo(s.x-dx*0.03,s.y-dy*0.03)
ctx.stroke()

})

warpTimer++

if(warpTimer>220){

createExploration()
currentPhase="EXPLORATION"

}

break

/* EXPLORATION */

case "EXPLORATION":

explorationStars.forEach(star=>{

let g=ctx.createRadialGradient(
star.x,star.y,0,
star.x,star.y,30)

g.addColorStop(0,"white")
g.addColorStop(0.3,"cyan")
g.addColorStop(0.6,"rgba(150,150,255,0.4)")
g.addColorStop(1,"transparent")

ctx.fillStyle=g

ctx.beginPath()
ctx.arc(star.x,star.y,30,0,Math.PI*2)
ctx.fill()

})

particles.forEach(p=>{
p.update()
p.draw()
})

particles=particles.filter(p=>p.life>0)

break

/* VORTEX */

case "VORTEX":

let cx=canvas.width/2
let cy=canvas.height/2

vortexAngle+=0.05

explorationStars.forEach(star=>{

star.radius*=0.97
star.angle+=0.1

star.x=cx+Math.cos(star.angle)*star.radius
star.y=cy+Math.sin(star.angle)*star.radius

ctx.fillStyle="white"

ctx.beginPath()
ctx.arc(star.x,star.y,3,0,Math.PI*2)
ctx.fill()

})

if(explorationStars[0].radius<5){
currentPhase="BIGBANG"
}

break

/* BIG BANG */

case "BIGBANG":

if(!bigBangTriggered){

for(let i=0;i<1000;i++){

particles.push(new Particle(canvas.width/2,canvas.height/2))

}

screenShake()

document.body.style.background=
"linear-gradient(135deg,#ff6ec4,#7873f5)"

typeWriter(
"Trong vũ trụ tri thức rộng lớn, cô chính là ngôi sao dẫn đường cho chúng em. Cảm ơn cô vì tất cả."
)

bigBangTriggered=true

}

particles.forEach(p=>{
p.update()
p.draw()
})

particles=particles.filter(p=>p.life>0)

break

}

requestAnimationFrame(animate)

}

animate()

</script>
</body>
</html>
