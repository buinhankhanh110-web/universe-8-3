<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vũ Trụ Lớp Học</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

/* ===== PASSWORD SCREEN ===== */

#login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

#login input{
padding:10px;
font-size:18px;
margin-top:10px;
}

#login button{
margin-top:10px;
padding:8px 20px;
font-size:16px;
cursor:pointer;
}

/* ===== SPACE ===== */

#space{
display:none;
}

/* ===== STAR ===== */

.star{
position:absolute;
width:30px;
height:30px;
border-radius:50%;
background:white;
box-shadow:0 0 15px white;
cursor:pointer;
transition:transform .3s;
}

.star:hover{
transform:scale(1.3);
}

/* ===== ZOOM MODE ===== */

#focus{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

#focus img{
width:200px;
height:200px;
border-radius:50%;
margin-bottom:20px;
}

#focus h2{
color:white;
}

#focus button{
margin-top:20px;
padding:8px 20px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">
<h1>Nhập mật khẩu để vào vũ trụ</h1>
<input type="password" id="pass">
<button onclick="login()">Vào</button>
</div>

<!-- SPACE -->

<div id="space"></div>

<!-- FOCUS VIEW -->

<div id="focus">
<img id="girlImg">
<h2 id="girlName"></h2>
<button onclick="closeFocus()">Quay lại</button>
</div>

<script>

/* ===== PASSWORD ===== */

let password="123456"

function login(){

let input=document.getElementById("pass").value

if(input===password){

document.getElementById("login").style.display="none"
document.getElementById("space").style.display="block"

spawnStars()

}else{

alert("Sai mật khẩu")

}

}

/* ===== DATA ===== */

let girls=[
{
name:"Linh",
img:"linh.jpg"
},
{
name:"Mai",
img:"mai.jpg"
},
{
name:"Trang",
img:"trang.jpg"
},
{
name:"Vy",
img:"vy.jpg"
},
{
name:"Ngọc",
img:"ngoc.jpg"
}
]

/* ===== CREATE STARS ===== */

function spawnStars(){

let space=document.getElementById("space")

girls.forEach(g=>{

let star=document.createElement("div")

star.className="star"

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

star.style.left=x+"px"
star.style.top=y+"px"

star.onclick=()=>{
focusStar(g)
}

space.appendChild(star)

})

}

/* ===== ZOOM ===== */

function focusStar(girl){

document.getElementById("focus").style.display="flex"

document.getElementById("girlImg").src=girl.img
document.getElementById("girlName").innerText=girl.name

}

/* ===== CLOSE ===== */

function closeFocus(){

document.getElementById("focus").style.display="none"

}

</script>

</body>
</html>
