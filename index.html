<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>8/3 - 10A1 Cosmic Constellation - Final Version</title>
    <style>
        :root { 
            --cyan-glow: #00ffff; 
            --pink-glow: #ff75c3; 
            --white-glow: #ffffff;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        canvas { display: block; }

        /* Giao diện lớp phủ ban đầu */
        .ui-layer { 
            position: fixed; 
            inset: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 10; 
            transition: opacity 1.5s, transform 1.5s; 
            background: radial-gradient(circle, rgba(0,20,40,0.5) 0%, rgba(0,0,0,1) 100%);
        }

        #login-panel { text-align: center; color: white; }

        .cosmic-title { 
            font-size: 3.5em; 
            letter-spacing: 15px; 
            margin-bottom: 30px; 
            text-shadow: 0 0 20px var(--cyan-glow); 
            animation: pulse-glow 2s infinite alternate; 
        }

        @keyframes pulse-glow { 
            from { text-shadow: 0 0 10px var(--cyan-glow); opacity: 0.8; } 
            to { text-shadow: 0 0 30px #fff, 0 0 40px var(--cyan-glow); opacity: 1; } 
        }

        .cosmic-input { 
            background: rgba(255,255,255,0.1); 
            border: 2px solid var(--cyan-glow); 
            color: white; 
            padding: 12px 25px; 
            text-align: center; 
            border-radius: 30px; 
            outline: none; 
            font-size: 1.2em; 
            transition: 0.3s; 
            width: 250px;
        }

        .cosmic-input:focus { 
            background: rgba(255,255,255,0.2); 
            box-shadow: 0 0 15px var(--cyan-glow); 
        }

        .launch-btn {
            margin-top: 30px; 
            padding: 15px 60px; 
            border-radius: 40px; 
            border: none;
            background: var(--cyan-glow); 
            color: black; 
            font-weight: bold; 
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 20px var(--cyan-glow); 
            transition: 0.4s; 
            letter-spacing: 2px;
        }

        .launch-btn:hover { 
            transform: scale(1.1) translateY(-5px); 
            box-shadow: 0 0 40px #fff; 
        }

        .hidden { 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(1.5); 
        }
        
        /* Overlay thông tin chi tiết các bạn nữ */
        .info-overlay { 
            position: fixed; 
            inset: 0; 
            display: none; 
            justify-content: center; 
            align-items: center; 
            background: rgba(0,0,0,0.9); 
            z-index: 100; 
            opacity: 0; 
            transition: 0.6s;
        }

        .galaxy-card {
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.95) 0%, rgba(30, 10, 40, 0.95) 100%);
            border: 2px solid var(--cyan-glow); 
            padding: 50px; 
            border-radius: 30px; 
            text-align: center; 
            color: white; 
            max-width: 500px; 
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
        }

        .galaxy-card h2 { 
            color: var(--cyan-glow); 
            font-size: 2.8em; 
            margin-bottom: 20px; 
            letter-spacing: 3px; 
        }

        .galaxy-card p { 
            font-size: 1.5em; 
            line-height: 1.8; 
            color: #eee; 
            font-style: italic; 
        }
    </style>
</head>
<body>

    <canvas id="universe"></canvas>

    <div class="ui-layer" id="gate-ui">
        <div id="login-panel">
            <h1 class="cosmic-title">GALAXY 10A1</h1>
            <input type="password" id="gate-pass" class="cosmic-input" placeholder="MẬT MÃ 83">
            <br>
            <button class="launch-btn" onclick="CosmicEngine.warpDrive()">KHỞI ĐỘNG VŨ TRỤ</button>
        </div>
    </div>

    <div class="info-overlay" id="detail-overlay" onclick="CosmicEngine.closeDetail()">
        <div class="galaxy-card">
            <h2 id="girl-name"></h2>
            <p id="girl-wish"></p>
            <p style="margin-top: 35px; font-size: 0.8em; color: var(--pink-glow); opacity: 0.8;">[ Chạm bất kỳ đâu để quay lại ]</p>
        </div>
    </div>

<script>
    // Cấu hình thông số hệ thống
    const CosmicConfig = {
        starCount: 1600,
        baseSpeed: 0.4,
        warpSpeed: 48,
        meteorChance: 0.006,
        gatePassword: "83"
    };

    // Danh sách 30 bạn nữ 10A1
    const girls = [
        {n: "Bảo Ngọc", w: "Viên ngọc quý của lớp, luôn rạng rỡ nhé!"},
        {n: "Hà Phương", w: "Chúc Phương luôn giữ mãi nét đáng yêu."},
        {n: "Tuyết Mai", w: "Xinh đẹp và mạnh mẽ như đóa mai trong tuyết."},
        {n: "Diệp Chi", w: "Tràn đầy năng lượng và niềm vui Chi nhé!"},
        {n: "Khánh Huyền", w: "Mãi nở nụ cười xinh xắn trên môi nha!"},
        {n: "Ngọc Lan", w: "Hương thơm ngát và dịu dàng như loài hoa lan."},
        {n: "Phương Thảo", w: "Chúc Thảo luôn gặp nhiều may mắn."},
        {n: "Thu Hà", w: "Giữ mãi nét hồn nhiên và trong sáng nhé Hà."},
        {n: "Hà Chi", w: "Tỏa sáng theo cách riêng của em!"},
        {n: "Thùy Linh", w: "Dịu dàng, nết na và luôn hạnh phúc."},
        {n: "Huyền Trang", w: "Cứ mãi xinh đẹp và tỏa sáng nhé Trang."},
        {n: "Phương Linh", w: "Niềm vui sẽ luôn bên em, Phương Linh."},
        {n: "Quỳnh Anh", w: "Rạng rỡ như loài hoa quỳnh về đêm."},
        {n: "Mai Hương", w: "Mạnh mẽ và tỏa hương sắc cho đời."},
        {n: "Hà My", w: "Hồn nhiên và đáng yêu nhất hệ mặt trời!"},
        {n: "Lan Anh", w: "Chúc Lan Anh vạn điều tốt lành."},
        {n: "Thùy Dương", w: "Dịu dàng như tên gọi của em vậy."},
        {n: "Yến Nhi", w: "Sải cánh bay cao như chim yến nhỏ."},
        {n: "Bảo Quyên", w: "Xinh đẹp, quý phái và luôn tự tin."},
        {n: "Huyền Diệu", w: "Cuộc sống của em sẽ luôn diệu kỳ."},
        {n: "Trúc Mai", w: "Mạnh mẽ như trúc, rạng rỡ như mai."},
        {n: "Tú Anh", w: "Thông minh và luôn tỏa sáng rực rỡ."},
        {n: "Ngọc Mai", w: "Quý giá và xinh đẹp vô cùng."},
        {n: "Hoàng Yến", w: "Mãi giữ nét hồn nhiên này Yến nhé."},
        {n: "Ngọc Diệp", w: "Lá ngọc cành vàng của 10A1."},
        {n: "Hương Giang", w: "Dịu dàng như dòng sông xanh ngắt."},
        {n: "Bảo Chi", w: "Quý báu như vầng trăng sáng."},
        {n: "Mai Phương", w: "Rạng rỡ như ánh nắng ban mai."},
        {n: "Hồng Nhung", w: "Xinh đẹp và kiêu sa như đóa hồng."},
        {n: "Hoài Thương", w: "Mãi là cô gái đáng yêu của lớp nhé."}
    ];

    // Lớp Sao nền 3D (Hyper-space)
    class Particle {
        constructor(w, h) { this.w = w; this.h = h; this.reset(); }
        reset() {
            this.x = Math.random() * this.w - this.w / 2;
            this.y = Math.random() * this.h - this.h / 2;
            this.z = Math.random() * this.w;
            this.pz = this.z;
        }
        update(speed) {
            this.pz = this.z;
            this.z -= speed;
            if (this.z < 1) { this.reset(); this.pz = this.z; }
        }
        draw(ctx, w, h) {
            let sx = (this.x / this.z) * w + w / 2;
            let sy = (this.y / this.z) * h + h / 2;
            let px = (this.x / this.pz) * w + w / 2;
            let py = (this.y / this.pz) * h + h / 2;
            ctx.strokeStyle = `rgba(255, 255, 255, ${Math.min(1, 1 - this.z / w)})`;
            ctx.lineWidth = (1 - this.z / w) * 2.5;
            ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy); ctx.stroke();
        }
    }

    // Lớp Sao băng (Meteor)
    class Meteor {
        constructor(w, h) { this.w = w; this.h = h; this.init(); }
        init() {
            this.x = Math.random() * this.w;
            this.y = Math.random() * -h; // Xuất hiện từ phía trên
            this.speed = Math.random() * 10 + 10;
            this.len = Math.random() * 100 + 50;
            this.active = false;
        }
        update() {
            if (!this.active && Math.random() < CosmicConfig.meteorChance) this.active = true;
            if (this.active) {
                this.x -= this.speed;
                this.y += this.speed;
                if (this.x < -200 || this.y > this.h + 200) this.init();
            }
        }
        draw(ctx) {
            if (!this.active) return;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + this.len, this.y - this.len);
            ctx.stroke();
        }
    }

    // Công cụ vận hành chính
    const CosmicEngine = {
        canvas: null, ctx: null, stars: [], meteors: [], femaleStars: [], speed: CosmicConfig.baseSpeed,
        
        init() {
            this.canvas = document.getElementById('universe');
            this.ctx = this.canvas.getContext('2d');
            this.resize();
            for(let i=0; i < CosmicConfig.starCount; i++) this.stars.push(new Particle(this.canvas.width, this.canvas.height));
            for(let i=0; i < 4; i++) this.meteors.push(new Meteor(this.canvas.width, this.canvas.height));
            window.addEventListener('resize', () => this.resize());
            this.render();
        },

        resize() {
            this.canvas.width = window.innerWidth; 
            this.canvas.height = window.innerHeight;
            if (this.femaleStars.length > 0) this.setupConstellation();
        },

        warpDrive() {
            const pass = document.getElementById('gate-pass').value;
            if (pass === CosmicConfig.gatePassword) {
                document.getElementById('gate-ui').classList.add('hidden');
                let warp = setInterval(() => {
                    this.speed += 2;
                    if (this.speed >= CosmicConfig.warpSpeed) {
                        clearInterval(warp);
                        setTimeout(() => this.slowDown(), 1000);
                    }
                }, 50);
            } else {
                alert("Mật mã không đúng rồi! Thử lại ngày đặc biệt nhé (83)");
            }
        },

        slowDown() {
            let slow = setInterval(() => {
                this.speed -= 1.2;
                if (this.speed <= CosmicConfig.baseSpeed) {
                    clearInterval(slow);
                    this.speed = CosmicConfig.baseSpeed;
                    this.setupConstellation();
                    this.canvas.onclick = (e) => this.handleCanvasClick(e);
                }
            }, 80);
        },

        setupConstellation() {
            const w = this.canvas.width, h = this.canvas.height;
            const cx = w/2, cy = h/2;
            const s = Math.min(w, h) / 10; // Tỷ lệ co giãn theo màn hình

            // Tọa độ các nút chính tạo chữ 10A1
            const points = [
                // Số 1
                {x: cx - 4*s, y: cy - 1.5*s}, {x: cx - 4*s, y: cy}, {x: cx - 4*s, y: cy + 1.5*s},
                // Số 0
                {x: cx - 2.5*s, y: cy - 1.5*s}, {x: cx - 1*s, y: cy - 1.5*s}, {x: cx - 1*s, y: cy + 1.5*s}, {x: cx - 2.5*s, y: cy + 1.5*s}, {x: cx - 2.5*s, y: cy}, {x: cx - 1*s, y: cy},
                // Chữ A
                {x: cx + 0.5*s, y: cy + 1.5*s}, {x: cx + 1.25*s, y: cy - 1.5*s}, {x: cx + 2*s, y: cy + 1.5*s}, {x: cx + 0.8*s, y: cy + 0.3*s}, {x: cx + 1.7*s, y: cy + 0.3*s},
                // Số 1
                {x: cx + 3.5*s, y: cy - 1.5*s}, {x: cx + 3.5*s, y: cy}, {x: cx + 3.5*s, y: cy + 1.5*s}
            ];

            this.femaleStars = girls.map((g, i) => {
                const target = points[i % points.length];
                return {
                    ...g,
                    x: target.x + (Math.random() * 10 - 5),
                    y: target.y + (Math.random() * 10 - 5),
                    origX: target.x,
                    origY: target.y,
                    angle: Math.random() * Math.PI * 2
                };
            });
        },

        drawLines() {
            this.ctx.strokeStyle = "rgba(0, 255, 255, 0.15)";
            this.ctx.lineWidth = 1;
            // Vẽ các đường nối tượng trưng cho chòm sao
            for(let i=0; i < this.femaleStars.length - 1; i++) {
                const s1 = this.femaleStars[i];
                const s2 = this.femaleStars[i+1];
                // Chỉ nối các sao gần nhau trong cùng một ký tự
                if (Math.hypot(s1.origX - s2.origX, s1.origY - s2.origY) < 150) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(s1.x, s1.y);
                    this.ctx.lineTo(s2.x, s2.y);
                    this.ctx.stroke();
                }
            }
        },

        handleCanvasClick(e) {
            this.femaleStars.forEach(s => {
                if (Math.hypot(e.clientX - s.x, e.clientY - s.y) < 30) {
                    document.getElementById('girl-name').innerText = s.n;
                    document.getElementById('girl-wish').innerText = s.w;
                    const o = document.getElementById('detail-overlay');
                    o.style.display = 'flex';
                    setTimeout(() => o.style.opacity = '1', 10);
                }
            });
        },

        closeDetail() {
            const o = document.getElementById('detail-overlay');
            o.style.opacity = '0';
            setTimeout(() => o.style.display = 'none', 500);
        },

        render() {
            this.ctx.fillStyle = "black";
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            // Vẽ sao nền và sao băng
            this.stars.forEach(s => { s.update(this.speed); s.draw(this.ctx, this.canvas.width, this.canvas.height); });
            this.meteors.forEach(m => { m.update(); m.draw(this.ctx); });

            // Vẽ chòm sao 10A1 khi tốc độ ổn định
            if (this.femaleStars.length > 0 && this.speed < 5) {
                this.drawLines();
                this.femaleStars.forEach(fs => {
                    fs.angle += 0.03; // Hiệu ứng lơ lửng
                    fs.x = fs.origX + Math.sin(fs.angle) * 5;
                    fs.y = fs.origY + Math.cos(fs.angle) * 5;

                    this.ctx.shadowBlur = 15;
                    this.ctx.shadowColor = "white";
                    this.ctx.fillStyle = "white";
                    this.ctx.beginPath();
                    this.ctx.arc(fs.x, fs.y, 3.5, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });
            }

            requestAnimationFrame(() => this.render());
        }
    };

    window.onload = () => CosmicEngine.init();
</script>
</body>
</html>
