<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>8/3 - Cosmic Galaxy 10A1</title>
    <style>
        :root { --cyan: #00ffff; --pink: #ff75c3; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        /* UI Layer */
        .ui { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 10; transition: 1.5s; background: radial-gradient(circle, rgba(0,20,40,0.4) 0%, rgba(0,0,0,1) 100%); }
        #panel { text-align: center; color: white; }
        .title { font-size: 3.5em; letter-spacing: 12px; text-shadow: 0 0 25px var(--cyan); margin-bottom: 20px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { opacity: 0.8; } to { opacity: 1; text-shadow: 0 0 40px var(--cyan); } }
        
        .input { background: rgba(255,255,255,0.1); border: 2px solid var(--cyan); color: white; padding: 12px; border-radius: 30px; text-align: center; outline: none; width: 220px; font-size: 1.1em; }
        .btn { margin-top: 30px; padding: 15px 50px; border-radius: 40px; border: none; background: var(--cyan); color: #000; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--cyan); transition: 0.4s; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 40px #fff; }
        
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.2); }
        
        /* Overlay chúc mừng */
        .overlay { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); z-index: 100; opacity: 0; transition: 0.5s; }
        .card { background: linear-gradient(135deg, rgba(10, 20, 35, 0.9) 0%, rgba(30, 10, 40, 0.9) 100%); border: 2px solid var(--cyan); padding: 40px; border-radius: 25px; text-align: center; color: white; max-width: 450px; }
    </style>
</head>
<body>

    <canvas id="universe"></canvas>

    <div class="ui" id="gate">
        <div id="panel">
            <h1 class="title">GALAXY 10A1</h1>
            <input type="password" id="pass" class="input" placeholder="MẬT MÃ 83">
            <br>
            <button class="btn" onclick="Engine.warp()">KHỞI ĐỘNG HÀNH TRÌNH</button>
        </div>
    </div>

    <div class="overlay" id="detail" onclick="Engine.close()">
        <div class="card">
            <h2 id="g-name" style="color:var(--cyan); font-size: 2.5em; margin-bottom: 10px;"></h2>
            <p id="g-wish" style="font-size: 1.4em; line-height: 1.6; color: #eee; font-style: italic;"></p>
            <p style="margin-top: 25px; font-size: 0.8em; color: var(--pink);">[ Chạm để quay lại ]</p>
        </div>
    </div>

<script>
    /** * HYPER-SPACE ENGINE v4.0 - Recovery Edition
     * Giữ nguyên hiệu ứng sao bay và sao băng xịn xò
     */
    const CosmicConfig = {
        starCount: 1500,
        meteorChance: 0.005, // Tỷ lệ xuất hiện sao băng
        baseSpeed: 0.5,
        warpSpeed: 45,
        gatePassword: "83"
    };

    const girls = [
        {n:"Bảo Ngọc", w:"Viên ngọc quý của 10A1, luôn rạng rỡ nhé!"}, {n:"Hà Phương", w:"Chúc Phương luôn giữ mãi nét đáng yêu."},
        {n:"Tuyết Mai", w:"Xinh đẹp và mạnh mẽ như đóa mai trong tuyết."}, {n:"Diệp Chi", w:"Tràn đầy năng lượng và niềm vui Chi nhé!"},
        {n:"Khánh Huyền", w:"Mãi nở nụ cười xinh xắn trên môi nha!"}, {n:"Ngọc Lan", w:"Hương thơm ngát và dịu dàng như loài hoa lan."},
        {n:"Phương Thảo", w:"Chúc Thảo luôn gặp nhiều may mắn."}, {n:"Thu Hà", w:"Giữ mãi nét hồn nhiên và trong sáng nhé Hà."},
        {n:"Hà Chi", w:"Tỏa sáng theo cách riêng của em!"}, {n:"Thùy Linh", w:"Dịu dàng, nết na và luôn hạnh phúc."},
        {n:"Huyền Trang", w:"Cứ mãi xinh đẹp và tỏa sáng nhé Trang."}, {n:"Phương Linh", w:"Niềm vui sẽ luôn bên em, Phương Linh."},
        {n:"Quỳnh Anh", w:"Rạng rỡ như loài hoa quỳnh về đêm."}, {n:"Mai Hương", w:"Mạnh mẽ và tỏa hương sắc cho đời."},
        {n:"Hà My", w:"Hồn nhiên và đáng yêu nhất hệ mặt trời!"}, {n:"Lan Anh", w:"Chúc Lan Anh vạn điều tốt lành."},
        {n:"Thùy Dương", w:"Dịu dàng như tên gọi của em vậy."}, {n:"Yến Nhi", w:"Sải cánh bay cao như chim yến nhỏ."},
        {n:"Bảo Quyên", w:"Xinh đẹp, quý phái và luôn tự tin."}, {n:"Huyền Diệu", w:"Cuộc sống của em sẽ luôn diệu kỳ."},
        {n:"Trúc Mai", w:"Mạnh mẽ như trúc, rạng rỡ như mai."}, {n:"Tú Anh", w:"Thông minh và luôn tỏa sáng rực rỡ."},
        {n:"Ngọc Mai", w:"Quý giá và xinh đẹp vô cùng."}, {n:"Hoàng Yến", w:"Mãi giữ nét hồn nhiên này Yến nhé."},
        {n:"Ngọc Diệp", w:"Lá ngọc cành vàng của 10A1."}, {n:"Hương Giang", w:"Dịu dàng như dòng sông xanh ngắt."},
        {n:"Bảo Chi", w:"Quý báu như vầng trăng sáng."}, {n:"Mai Phương", w:"Rạng rỡ như ánh nắng ban mai."},
        {n:"Hồng Nhung", w:"Xinh đẹp và kiêu sa như đóa hồng."}, {n:"Hoài Thương", w:"Mãi là cô gái đáng yêu của lớp nhé."}
    ];

    class Particle {
        constructor(w, h) { this.w = w; this.h = h; this.init(); }
        init() {
            this.x = Math.random() * this.w - this.w / 2;
            this.y = Math.random() * this.h - this.h / 2;
            this.z = Math.random() * this.w;
            this.pz = this.z;
        }
        update(speed) {
            this.pz = this.z; this.z -= speed;
            if (this.z < 1) { this.init(); this.pz = this.z; }
        }
        draw(ctx, w, h) {
            let sx = (this.x / this.z) * w + w / 2;
            let sy = (this.y / this.z) * h + h / 2;
            let px = (this.x / this.pz) * w + w / 2;
            let py = (this.y / this.pz) * h + h / 2;
            ctx.strokeStyle = `rgba(255, 255, 255, ${1 - this.z / w})`;
            ctx.lineWidth = (1 - this.z / w) * 2;
            ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy); ctx.stroke();
        }
    }

    class Meteor {
        constructor(w, h) { this.w = w; this.h = h; this.reset(); }
        reset() {
            this.x = Math.random() * this.w; this.y = -10;
            this.speed = Math.random() * 15 + 10;
            this.len = Math.random() * 80 + 50;
            this.active = false;
        }
        update() {
            if(!this.active && Math.random() < CosmicConfig.meteorChance) this.active = true;
            if(this.active) {
                this.x -= this.speed; this.y += this.speed;
                if(this.x < -100 || this.y > this.h + 100) this.reset();
            }
        }
        draw(ctx) {
            if(!this.active) return;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.6)"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + this.len, this.y - this.len); ctx.stroke();
        }
    }

    const Engine = {
        canvas: document.getElementById('universe'), stars: [], fStars: [], meteors: [], speed: CosmicConfig.baseSpeed,
        init() {
            this.ctx = this.canvas.getContext('2d');
            this.resize();
            for(let i=0; i<CosmicConfig.starCount; i++) this.stars.push(new Particle(this.canvas.width, this.canvas.height));
            for(let i=0; i<3; i++) this.meteors.push(new Meteor(this.canvas.width, this.canvas.height));
            window.onresize = () => this.resize();
            this.render();
        },
        resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },
        warp() {
            if(document.getElementById('pass').value !== CosmicConfig.gatePassword) return alert("Mật mã là 83!");
            document.getElementById('gate').classList.add('hidden');
            let v = setInterval(() => { 
                this.speed += 1.5; 
                if(this.speed >= CosmicConfig.warpSpeed) { 
                    clearInterval(v); setTimeout(() => this.slow(), 1500); 
                } 
            }, 50);
        },
        slow() {
            let v = setInterval(() => {
                this.speed -= 1;
                if(this.speed <= CosmicConfig.baseSpeed) {
                    clearInterval(v); this.speed = CosmicConfig.baseSpeed;
                    this.createConstellation();
                }
            }, 100);
        },
        createConstellation() {
            const w = this.canvas.width, h = this.canvas.height;
            const cx = w/2, cy = h/2, s = Math.min(w, h) / 8;
            // Tọa độ 10A1 cực chuẩn
            const p = [
                {x:cx-3.2*s, y:cy-1.5*s}, {x:cx-3.2*s, y:cy}, {x:cx-3.2*s, y:cy+1.5*s}, // 1
                {x:cx-1.8*s, y:cy-1.5*s}, {x:cx-0.5*s, y:cy-1.5*s}, {x:cx-0.5*s, y:cy+1.5*s}, {x:cx-1.8*s, y:cy+1.5*s}, {x:cx-1.8*s, y:cy}, {x:cx-0.5*s, y:cy}, // 0
                {x:cx+0.8*s, y:cy+1.5*s}, {x:cx+1.5*s, y:cy-1.5*s}, {x:cx+2.2*s, y:cy+1.5*s}, {x:cx+1.1*s, y:cy+0.2*s}, {x:cx+1.9*s, y:cy+0.2*s}, // A
                {x:cx+3.2*s, y:cy-1.5*s}, {x:cx+3.2*s, y:cy}, {x:cx+3.2*s, y:cy+1.5*s} // 1
            ];
            girls.forEach((g, i) => {
                let t = p[i % p.length];
                this.fStars.push({ ...g, x: t.x, y: t.y, oX: t.x, oY: t.y, a: Math.random()*Math.PI*2 });
            });
            this.canvas.onclick = (e) => this.checkClick(e);
        },
        checkClick(e) {
            this.fStars.forEach(s => {
                if(Math.hypot(e.clientX-s.x, e.clientY-s.y) < 25) {
                    document.getElementById('g-name').innerText = s.n;
                    document.getElementById('g-wish').innerText = s.w;
                    const o = document.getElementById('detail');
                    o.style.display='flex'; setTimeout(()=>o.style.opacity='1', 10);
                }
            });
        },
        close() { const o = document.getElementById('detail'); o.style.opacity='0'; setTimeout(()=>o.style.display='none', 500); },
        render() {
            this.ctx.fillStyle = '#000'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
            this.stars.forEach(s => { s.update(this.speed); s.draw(this.ctx, this.canvas.width, this.canvas.height); });
            this.meteors.forEach(m => { m.update(); m.draw(this.ctx); });
            
            if(this.fStars.length > 0 && this.speed < 5) {
                this.fStars.forEach(s => {
                    s.a += 0.04; s.x = s.oX + Math.sin(s.a)*4; s.y = s.oY + Math.cos(s.a)*4;
                    this.ctx.shadowBlur = 15; this.ctx.shadowColor = "#fff";
                    this.ctx.fillStyle = "#fff"; this.ctx.beginPath(); this.ctx.arc(s.x, s.y, 3, 0, Math.PI*2); this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });
